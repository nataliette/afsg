<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Equipment Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --bg-tertiary: #2a2a2a;
      --text-primary: #ffffff;
      --text-secondary: #b0b0b0;
      --accent: #bb86fc;
      --border: #333333;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      overflow-x: hidden;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 0;
    }

    header {
      background-color: var(--bg-secondary);
      padding: 16px 0;
      position: sticky;
      top: 0;
      z-index: 100;
      border-bottom: 1px solid var(--border);
    }

    .gym-selector {
      display: flex;
      overflow-x: auto;
      gap: 8px;
      padding: 0 16px;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }

    .gym-chip {
      padding: 10px 16px;
      border: 1px solid var(--border);
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      border-radius: 24px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 14px;
      transition: all 0.2s;
      flex-shrink: 0;
      min-height: 40px;
      display: flex;
      align-items: center;
      font-family: inherit;
    }

    .gym-chip:active,
    .gym-chip.active {
      background-color: var(--accent);
      color: #000000;
      border-color: var(--accent);
    }

    main {
      padding: 16px;
      min-height: calc(100vh - 80px);
    }

    .category {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .category-header {
      background-color: var(--bg-tertiary);
      padding: 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      -webkit-user-select: none;
      min-height: 48px;
      border: none;
      width: 100%;
      color: inherit;
      font-family: inherit;
      text-align: left;
    }

    .category-header:active {
      background-color: var(--bg-secondary);
    }

    .category-title {
      font-weight: 500;
      font-size: 16px;
    }

    .category-toggle {
      font-size: 14px;
      margin-left: 16px;
      flex-shrink: 0;
      transition: transform 0.2s;
    }

    .category.expanded .category-toggle {
      transform: rotate(180deg);
    }

    .category-content {
      display: none;
      background-color: var(--bg-primary);
      border-top: 1px solid var(--border);
      padding: 0;
    }

    .category.expanded .category-content {
      display: block;
    }

    .equipment-item {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-primary);
    }

    .equipment-item:last-child {
      border-bottom: none;
    }

    .empty-state {
      padding: 32px 16px;
      text-align: center;
      color: var(--text-secondary);
    }

    .error {
      padding: 32px 16px;
      text-align: center;
      color: #ff6b6b;
    }

    /* Scrollbar styling */
    .gym-selector::-webkit-scrollbar {
      height: 4px;
    }

    .gym-selector::-webkit-scrollbar-track {
      background: transparent;
    }

    .gym-selector::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    @media (max-width: 360px) {
      main {
        padding: 12px;
      }

      .gym-selector {
        padding: 0 12px;
      }

      .category-header {
        padding: 14px;
      }

      .equipment-item {
        padding: 10px 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="gym-selector" id="gymSelector"></div>
    </header>
    <main id="main">
      <div class="empty-state">Loading equipment data...</div>
    </main>
  </div>

  <script>
    const CATEGORIES = [
      "Cables",
      "Selectorized – Upper",
      "Selectorized – Lower",
      "Plate-Loaded",
      "Barbells & Racks",
      "Calisthenics",
      "Other"
    ];

    let equipmentData = null;
    let currentGym = null;

    async function loadEquipment() {
      try {
        const response = await fetch('./equipment.json');
        if (!response.ok) throw new Error('Failed to load equipment.json');
        equipmentData = await response.json();

        const gyms = Object.keys(equipmentData.gyms);
        if (gyms.length === 0) {
          showError('No gyms found in data');
          return;
        }

        currentGym = gyms[0];
        renderGymSelector(gyms);
        renderEquipment();
      } catch (error) {
        showError(`Error: ${error.message}`);
      }
    }

    function renderGymSelector(gyms) {
      const selector = document.getElementById('gymSelector');
      selector.innerHTML = '';

      gyms.forEach(gym => {
        const button = document.createElement('button');
        button.className = 'gym-chip' + (gym === currentGym ? ' active' : '');
        button.textContent = gym;
        button.onclick = () => selectGym(gym, gyms);
        selector.appendChild(button);
      });
    }

    function selectGym(gym, gyms) {
      currentGym = gym;
      renderGymSelector(gyms);
      renderEquipment();

      // Smooth scroll active chip into view
      const selector = document.getElementById('gymSelector');
      const activeChip = selector.querySelector('.active');
      if (activeChip) {
        activeChip.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }
    }

    function renderEquipment() {
      const main = document.getElementById('main');
      const gymData = equipmentData.gyms[currentGym];

      let html = '';
      let hasAnyCategory = false;

      CATEGORIES.forEach(category => {
        const items = gymData[category] || [];
        if (items.length === 0) return;

        hasAnyCategory = true;
        html += `
          <div class="category expanded">
            <button class="category-header" type="button">
              <span class="category-title">${category}</span>
              <span class="category-toggle">▼</span>
            </button>
            <div class="category-content">
              ${items.map(item => `<div class="equipment-item">${item}</div>`).join('')}
            </div>
          </div>
        `;
      });

      if (!hasAnyCategory) {
        main.innerHTML = '<div class="empty-state">No equipment data for this gym</div>';
        return;
      }

      main.innerHTML = html;

      // Add toggle listeners
      document.querySelectorAll('.category-header').forEach(header => {
        header.addEventListener('click', function() {
          this.closest('.category').classList.toggle('expanded');
        });
      });
    }

    function showError(message) {
      document.getElementById('main').innerHTML = `<div class="error">${message}</div>`;
    }

    // Load on page load
    document.addEventListener('DOMContentLoaded', loadEquipment);
  </script>
</body>
</html>
