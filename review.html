<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Review</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Inter, sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e0e0e0;
      padding: 24px;
    }

    h1 { font-size: 18px; font-weight: 700; margin-bottom: 4px; color: #fff; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 12px; }

    .toolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar input, .toolbar select {
      background: #1e1e1e;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
    }

    .toolbar input { width: 200px; }

    label { font-size: 12px; color: #888; }

    .btn {
      padding: 6px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
    }

    .btn-primary { background: #e8ff47; color: #000; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #444; }

    .stats {
      font-size: 12px;
      color: #555;
      margin-left: auto;
    }

    .stats span { color: #e8ff47; }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    thead th {
      text-align: left;
      padding: 8px 10px;
      background: #1a1a1a;
      border-bottom: 1px solid #333;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    th:nth-child(1) { width: 14%; }
    th:nth-child(2) { width: 10%; }
    th:nth-child(3) { width: 13%; }
    th:nth-child(4) { width: 16%; }
    th:nth-child(5) { width: 12%; }
    th:nth-child(6) { width: 35%; }

    tbody tr {
      border-bottom: 1px solid #1e1e1e;
    }

    tbody tr:hover { background: #161616; }

    tbody tr.changed { background: #1a1f00; }
    tbody tr.changed:hover { background: #202500; }

    tbody tr.mismatch { background: #1a1000; }
    tbody tr.mismatch:hover { background: #201500; }

    td {
      padding: 6px 10px;
      vertical-align: middle;
    }

    td.gym { color: #aaa; }
    td.category { color: #666; font-size: 11px; }
    td.brand { color: #888; }
    td.name { color: #e0e0e0; font-weight: 500; }
    td.resolved { font-family: monospace; font-size: 11px; }

    .resolved-match { color: #666; }
    .resolved-mapped { color: #e8ff47; }
    .resolved-changed { color: #88ff88; }

    .pill {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 600;
      margin-left: 6px;
      vertical-align: middle;
    }

    .pill-changed { background: #2a3a00; color: #b8ff47; }
    .pill-mismatch { background: #3a2000; color: #ffb047; }

    select.type-select {
      background: #1a1a1a;
      border: 1px solid #333;
      color: #e0e0e0;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-family: monospace;
      width: 100%;
      cursor: pointer;
    }

    select.type-select.changed {
      border-color: #88ff88;
      color: #88ff88;
    }

    .no-results {
      text-align: center;
      padding: 40px;
      color: #444;
    }

    .section-header {
      background: #141414;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      color: #555;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      border-bottom: 1px solid #222;
    }
  </style>
</head>
<body>

<h1>Equipment Review</h1>
<p class="subtitle">Check equipment → type mappings. Changed rows are highlighted green; yellow = name differs from resolved type.</p>

<div class="toolbar">
  <input type="text" id="filterInput" placeholder="Filter gym, brand, name…">
  <label>Gym</label>
  <select id="gymFilter"><option value="">All gyms</option></select>
  <label>Type</label>
  <select id="typeFilter"><option value="">All types</option></select>
  <label>Show</label>
  <select id="showFilter">
    <option value="">All</option>
    <option value="mismatch">Name ≠ Type only</option>
    <option value="changed">Changed only</option>
  </select>
  <div class="stats" id="stats"></div>
  <button class="btn btn-primary" id="exportBtn">Export JSON</button>
  <button class="btn btn-secondary" id="resetBtn">Reset changes</button>
</div>

<table>
  <thead>
    <tr>
      <th>Gym</th>
      <th>Category</th>
      <th>Brand</th>
      <th>Name (in JSON)</th>
      <th>Notes</th>
      <th>Equipment Type → Reassign</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>
<div class="no-results" id="noResults" style="display:none">No equipment matches your filters.</div>

<script>
const machineTypeMap = {
  "Bike": "Bike", "Airdyne2": "Bike", "Airdyne": "Bike", "Assault Bike Pro": "Bike",
  "Assault Air Bike": "Bike", "Bike Pro": "Bike", "Lifecycle Bike": "Bike", "LifeCycle": "Bike",
  "Stages Bike": "Bike", "Solo": "Bike", "Air Bike": "Bike", "Stationary Bike": "Bike",
  "Seated Bike": "Bike", "Spin Bike": "Bike", "BikeErg": "Bike", "Echo Bike": "Bike",
  "Rower": "Rower", "Rower Elite": "Rower", "AssaultRower Pro": "Rower", "Air Rower": "Rower",
  "Chest Press": "Chest Press", "Machine Chest Press": "Chest Press", "Iso-Lateral Chest Press": "Chest Press",
  "Incline Chest Press": "Chest Press", "Decline Chest Press": "Chest Press",
  "Plate-Loaded Chest Press": "Chest Press", "Converging Chest Press": "Chest Press",
  "Iso-Lateral Bench Press": "Chest Press",
  "Seated Row": "Seated Row", "Machine Row": "Seated Row", "Iso-Lateral Row": "Seated Row",
  "Seal Row": "Seated Row", "Plate-Loaded Row": "Seated Row", "Plate-Loaded Seated Row": "Seated Row",
  "Row": "Seated Row", "Low Row": "Seated Row",
  "Lat Pulldown": "Lat Pulldown", "Machine Lat Pulldown": "Lat Pulldown",
  "Iso-Lateral Lat Pulldown": "Lat Pulldown", "Wide-Grip Lat Pulldown": "Lat Pulldown",
  "Close-Grip Lat Pulldown": "Lat Pulldown", "Iso-Lateral Front Lat Pulldown": "Lat Pulldown",
  "Pulldown": "Lat Pulldown", "Pulldown 304": "Lat Pulldown",
  "Leg Press": "Leg Press", "45-Degree Leg Press": "Leg Press", "Angled Leg Press": "Leg Press",
  "Horizontal Leg Press": "Leg Press", "Vertical Leg Press": "Leg Press",
  "Seated Leg Press": "Leg Press", "Linear Leg Press": "Leg Press",
  "Hack Squat": "Hack Squat", "Linear Hack Squat": "Hack Squat",
  "Belt Squat": "Belt Squat",
  "Squat Machine": "Squat", "Perfect Squat": "Squat", "Super Squat Press": "Squat",
  "Shoulder Press": "Shoulder Press", "Converging Shoulder Press": "Shoulder Press",
  "Multi-Press": "Shoulder Press",
  "Leg Curl": "Leg Curl", "Seated Leg Curl": "Leg Curl", "Prone Leg Curl": "Leg Curl",
  "Hip Ab/Ad": "Hip Ab/Ad", "Hip Abduction Machine": "Hip Ab/Ad", "Hip Adduction Machine": "Hip Ab/Ad",
  "Hip Abductor/Adductor": "Hip Ab/Ad", "Hip Abduction/Adduction Machine": "Hip Ab/Ad",
  "Inner/Outer Thigh Machine": "Hip Ab/Ad", "Inner/Outer Thigh": "Hip Ab/Ad",
  "Hip Thrust": "Hip Thrust", "Hip Thrust Machine": "Hip Thrust",
  "Hip Thrust Elite": "Hip Thrust", "Glute Drive": "Hip Thrust",
  "Pec Delt Fly": "Pec Delt Fly", "Rear Delt Fly": "Pec Delt Fly",
  "Rear Delt Reverse Fly Machine": "Pec Delt Fly", "Fly/Delt Machine": "Pec Delt Fly",
  "Rear Delt Machine": "Pec Delt Fly", "Rear Delt / Pec Fly": "Pec Delt Fly",
  "Pec Fly / Rear Delt": "Pec Delt Fly", "Pectoral Fly / Rear Deltoid": "Pec Delt Fly",
  "Rear Delt Pec Fly": "Pec Delt Fly",
  "Abdominal": "Abdominal", "Abdominal Crunch": "Abdominal", "Vertical Crunch": "Abdominal",
  "Back Extension": "Back Extension", "Back Extension Bench": "Back Extension",
  "Back Extension Machine": "Back Extension",
  "Smith Machine": "Smith Machine",
  "Deadlift Platform": "Deadlift Platform",
  "Lateral Raise": "Lateral Raise", "Standing Lateral Raise": "Lateral Raise",
  "Plate Loaded Lat Raise": "Lateral Raise",
  "Cable Station": "Cable Station", "Dual Cable Station": "Cable Station",
  "Adjustable Pulley": "Cable Station", "Multistation Adjustable Pulley": "Cable Station",
  "Single Pulley": "Cable Station", "Dual Adjustable Pulley": "Cable Station",
  "Multistation": "Cable Station", "Dual Pulley Pulldown": "Cable Station",
  "FTS Glide": "Cable Station", "Cable": "Cable Station", "Cable Tower": "Cable Station",
  "Longpull 302": "Cable Station",
  "Exercise Ball 55cm": "Exercise Ball", "Exercise Ball 65cm": "Exercise Ball",
  "Exercise Ball": "Exercise Ball",
};

const ALL_TYPES = [...new Set([
  ...Object.values(machineTypeMap),
  'Bike', 'Rower', 'RowErg', 'Elliptical', 'Treadmill', 'Stairmaster',
  'Rack', 'Smith Machine', 'Deadlift Platform',
  'Chest Press', 'Incline Chest Press', 'Decline Chest Press',
  'Shoulder Press', 'Row', 'Seated Row', 'Lat Pulldown',
  'Leg Press', 'Hack Squat', 'Belt Squat', 'Leg Curl', 'Leg Extension',
  'Hip Ab/Ad', 'Hip Thrust', 'Pec Delt Fly', 'Back Extension',
  'Abdominal', 'Lateral Raise', 'Seated Calf Raise', 'Calf Raise',
  'Cable Station', 'Dual Adjustable Pulley',
  'Biceps Curl', 'Triceps Press', 'Biceps Curl/Triceps Extension',
  'Captain\'s Chair', 'Chin/Dip', 'Pull-up Bar', 'TRX', 'Battle Rope',
  'Punching Bag', 'Kettlebells', 'Medicine Ball', 'Farmer\'s Carry',
  'Exercise Ball', 'Bosu Ball', 'Resistance Bands',
  'T-Bar Row', 'Belt Squat', 'Rotary Torso',
  'Other',
])].sort();

let originalData = null;
let workingData = null;
let overrides = {}; // key: `gym||category||index` → new type name

function resolve(name) {
  return machineTypeMap[name] || name;
}

async function init() {
  const res = await fetch('equipment.json');
  originalData = await res.json();
  workingData = JSON.parse(JSON.stringify(originalData));

  // Populate gym filter
  const gymFilter = document.getElementById('gymFilter');
  Object.keys(workingData.gyms).sort().forEach(gym => {
    const opt = document.createElement('option');
    opt.value = gym;
    opt.textContent = gym;
    gymFilter.appendChild(opt);
  });

  // Populate type filter
  const typeFilter = document.getElementById('typeFilter');
  ALL_TYPES.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    typeFilter.appendChild(opt);
  });

  render();
}

function render() {
  const filter = document.getElementById('filterInput').value.toLowerCase();
  const gymFilter = document.getElementById('gymFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;
  const showFilter = document.getElementById('showFilter').value;

  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let total = 0, shown = 0, changedCount = 0, mismatchCount = 0;

  for (const [gymName, gymData] of Object.entries(workingData.gyms)) {
    if (!gymData.categories) continue;
    if (gymFilter && gymName !== gymFilter) continue;

    for (const [category, machines] of Object.entries(gymData.categories)) {
      machines.forEach((machine, idx) => {
        total++;
        const key = `${gymName}||${category}||${idx}`;
        const currentName = machine.name;
        const resolvedType = resolve(currentName);
        const isChanged = overrides[key] !== undefined;
        const displayType = isChanged ? overrides[key] : resolvedType;
        const isMismatch = !isChanged && currentName !== resolvedType;

        if (typeFilter && displayType !== typeFilter) return;

        const searchStr = [gymName, category, machine.brand, currentName, machine.notes || ''].join(' ').toLowerCase();
        if (filter && !searchStr.includes(filter)) return;

        if (showFilter === 'mismatch' && !isMismatch) return;
        if (showFilter === 'changed' && !isChanged) return;

        shown++;
        if (isChanged) changedCount++;
        if (isMismatch) mismatchCount++;

        const tr = document.createElement('tr');
        tr.className = isChanged ? 'changed' : isMismatch ? 'mismatch' : '';

        // Build type select
        const selectHtml = `<select class="type-select${isChanged ? ' changed' : ''}" data-key="${key}" data-original="${resolvedType}">
          <option value="">— same as name (${resolvedType}) —</option>
          ${ALL_TYPES.map(t => `<option value="${t}"${(isChanged && overrides[key] === t) ? ' selected' : ''}>${t}</option>`).join('')}
        </select>`;

        const pill = isChanged
          ? `<span class="pill pill-changed">changed</span>`
          : isMismatch
          ? `<span class="pill pill-mismatch">mapped</span>`
          : '';

        tr.innerHTML = `
          <td class="gym">${gymName}</td>
          <td class="category">${category}</td>
          <td class="brand">${machine.brand || '—'}</td>
          <td class="name">${currentName}</td>
          <td class="category">${machine.notes || ''}</td>
          <td>${selectHtml}${pill}</td>
        `;

        tbody.appendChild(tr);
      });
    }
  }

  // Attach change listeners
  tbody.querySelectorAll('select.type-select').forEach(sel => {
    sel.addEventListener('change', (e) => {
      const key = e.target.dataset.key;
      const val = e.target.value;
      if (val) {
        overrides[key] = val;
      } else {
        delete overrides[key];
      }
      render();
    });
  });

  document.getElementById('noResults').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('stats').innerHTML =
    `Showing <span>${shown}</span> of ${total} &nbsp;|&nbsp; <span>${changedCount}</span> changed &nbsp;|&nbsp; <span>${mismatchCount}</span> mapped`;
}

function buildExport() {
  const out = JSON.parse(JSON.stringify(workingData));

  for (const [key, newType] of Object.entries(overrides)) {
    const [gymName, category, idx] = key.split('||');
    out.gyms[gymName].categories[category][parseInt(idx)].name = newType;
  }

  return out;
}

document.getElementById('filterInput').addEventListener('input', render);
document.getElementById('gymFilter').addEventListener('change', render);
document.getElementById('typeFilter').addEventListener('change', render);
document.getElementById('showFilter').addEventListener('change', render);

document.getElementById('exportBtn').addEventListener('click', () => {
  const json = JSON.stringify(buildExport(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'equipment.json';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('resetBtn').addEventListener('click', () => {
  overrides = {};
  render();
});

init();
</script>
</body>
</html>
