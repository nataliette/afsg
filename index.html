<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Equipment Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside>
    <h2>Gyms</h2>
    <div class="gym-list" id="gymList"></div>
  </aside>

  <main>
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="search-overlay" id="searchOverlay"></div>

    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-menu-header">
        <button class="mobile-menu-close" id="mobileMenuCloseBtn">×</button>
        <h2>Gyms</h2>
      </div>
      <div class="gym-list" id="mobileGymList"></div>
    </div>

    <header>
      <div class="header-top">
        <button class="hamburger-btn" id="hamburgerBtn">

        </button>
        <h1>AF Gym Equipment List</h1>
        <div class="search-container" id="searchContainer">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by muscle group"
          >
          <button id="searchBtn" class="search-btn" type="button">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </button>
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button class="search-toggle-btn" id="searchToggleBtn">
          <svg class="search-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: block;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          <svg class="close-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display: none;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <div class="empty-state">Loading equipment data...</div>
    </div>

    <div class="modal-overlay" id="equipmentModalOverlay"></div>
    <div class="modal" id="equipmentModal">
      <div class="modal-body">
        <div class="modal-section inline-label">
          <label>Duration:</label>
          <div class="pill-group" id="durationGroup">
            <button type="button" class="pill-btn" data-value="30min">30min</button>
            <button type="button" class="pill-btn" data-value="45min">45min</button>
            <button type="button" class="pill-btn active" data-value="60min">60min</button>
            <button type="button" class="pill-btn" data-value="75min">75min</button>
            <button type="button" class="pill-btn" data-value="90min">90min</button>
          </div>
        </div>

        <div class="modal-section inline-label">
          <label>Focus:</label>
          <div class="pill-group" id="focusGroup">
            <button type="button" class="pill-btn" data-value="Push">Push</button>
            <button type="button" class="pill-btn" data-value="Pull">Pull</button>
            <button type="button" class="pill-btn" data-value="Legs">Legs</button>
            <button type="button" class="pill-btn active" data-value="Full Body">Full Body</button>
            <button type="button" class="pill-btn" data-value="Upper">Upper</button>
            <button type="button" class="pill-btn" data-value="Lower">Lower</button>
          </div>
        </div>

        <div class="modal-section">
          <pre id="equipmentText" class="equipment-text"></pre>
        </div>
      </div>
      <div class="modal-footer">
        <button id="copyEquipmentBtn" class="btn-primary">
          <svg class="btn-icon" width='20' height='20' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><g transform="matrix(1 0 0 1 12 12)"><path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform="translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 17 C 2 17.552 2.448 18 3 18 C 3.552 18 4 17.552 4 17 L 4 4 L 17 4 C 17.552 4 18 3.552 18 3 C 18 2.448 17.552 2 17 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z"/></g></svg>
          <span id="copyBtnText">Copy to Clipboard</span>
        </button>
        <button id="equipmentModalCloseBtn" class="btn-secondary">Close</button>
      </div>
    </div>
  </main>

  <script>
    const TAG_SUGGESTIONS = {
      'leg': ['quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors'],
      'upper': ['chest', 'back', 'shoulders', 'arms'],
      'back': ['back', 'biceps'],
      'lat': ['back', 'biceps'],
      'row': ['back', 'biceps'],
      'pull': ['back', 'biceps'],
      'rear': ['back', 'shoulders'],
      'delt': ['shoulders'],
      'chest': ['chest', 'triceps'],
      'fly': ['chest', 'back', 'shoulders'],
      'press': ['chest', 'shoulders', 'triceps'],
      'arm': ['biceps', 'triceps'],
      'bicep': ['biceps'],
      'tricep': ['triceps'],
      'shoulder': ['shoulders'],
      'core': ['core'],
      'card': ['cardio'],
      'quad': ['quads'],
      'ham': ['hamstrings'],
      'glute': ['glutes'],
      'calf': ['calves']
    };

    const ALL_TAGS = ['chest', 'back', 'shoulders', 'arms', 'biceps', 'triceps', 'legs', 'quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors', 'core', 'cardio', 'calisthenics'];

    const PRIMARY_TAGS = new Set(['chest', 'back', 'shoulders', 'arms', 'legs', 'core', 'cardio', 'calisthenics']);

    function isPrimaryTag(tag) {
      return PRIMARY_TAGS.has(tag);
    }

    const GYM_INITIALS = {
      'Cecil Street': 'CS',
      'Grandtral Complex': 'GC',
      'Harbourfront': 'HF',
      'Labrador View': 'LV',
      'New Queensway': 'NQ',
      'Pasir Panjang': 'PP',
      'Tanjong Pagar': 'TP',
      'Telok Blangah': 'TB',
      'Wheelock Place': 'WP'
    };

    const INITIAL_TO_GYM = {};
    Object.entries(GYM_INITIALS).forEach(([gym, initial]) => {
      INITIAL_TO_GYM[initial.toLowerCase()] = gym;
    });

    const machineTypeMap = {
      // Chest machines
      "Chest Press": "Chest Press",
      "Machine Chest Press": "Chest Press",
      "Iso-Lateral Chest Press": "Chest Press",
      "Incline Chest Press": "Chest Press",
      "Decline Chest Press": "Chest Press",
      "Plate-Loaded Chest Press": "Chest Press",
      "Converging Chest Press": "Chest Press",
      "ISO Lateral Bench Press": "Chest Press",

      // Seated row machines
      "Seated Row": "Seated Row",
      "Machine Row": "Seated Row",
      "Iso-Lateral Row": "Seated Row",
      "Seal Row": "Seated Row",
      "Plate-Loaded Row": "Seated Row",
      "Plate-Loaded Seated Row": "Seated Row",
      "Row": "Seated Row",
      "Low Row": "Seated Row",

      // Lat pulldown machines
      "Lat Pulldown": "Lat Pulldown",
      "Machine Lat Pulldown": "Lat Pulldown",
      "Iso-Lateral Lat Pulldown": "Lat Pulldown",
      "Wide-Grip Lat Pulldown": "Lat Pulldown",
      "Close-Grip Lat Pulldown": "Lat Pulldown",
      "ISO Lateral Front Lat Pulldown": "Lat Pulldown",

      // Leg press machines
      "Leg Press": "Leg Press",
      "45-Degree Leg Press": "Leg Press",
      "Angled Leg Press": "Leg Press",
      "Horizontal Leg Press": "Leg Press",
      "Vertical Leg Press": "Leg Press",
      "Seated Leg Press": "Leg Press",
      "Linear Leg Press": "Leg Press",

      // Squat machines
      "Hack Squat": "Squat",
      "Linear Hack Squat": "Squat",
      "Belt Squat": "Squat",

      // Shoulder press machines
      "Shoulder Press": "Shoulder Press",
      "Converging Shoulder Press": "Shoulder Press",
      "Multi-Press": "Shoulder Press",

      // Leg curl machines
      "Leg Curl": "Leg Curl",
      "Seated Leg Curl": "Leg Curl",
      "Prone Leg Curl": "Leg Curl",

      // Hip abduction/adduction machines
      "Hip Ab/Ad": "Hip Abduction/Adduction Machine",
      "Hip Abduction Machine": "Hip Abduction/Adduction Machine",
      "Hip Adduction Machine": "Hip Abduction/Adduction Machine",
      "Inner/Outer Thigh Machine": "Hip Abduction/Adduction Machine",

      // Hip thrust machines
      "Hip Thrust": "Hip Thrust",
      "Hip Thrust Machine": "Hip Thrust",
      "Hip Thrust Elite": "Hip Thrust",
      "Glute Drive": "Hip Thrust",

      // Rear delt/fly machines
      "Rear Delt Fly": "Rear Delt Fly",
      "Rear Delt Reverse Fly Machine": "Rear Delt Fly",
      "Fly/Delt Machine": "Rear Delt Fly",
      "Rear Delt Machine": "Rear Delt Fly",

      // Abdominal machines
      "Abdominal": "Abdominal",
      "Abdominal Crunch": "Abdominal",

      // Lateral raise machines
      "Lateral Raise": "Lateral Raise",
      "Standing Lateral Raise": "Lateral Raise",
      "Plate Loaded Lat Raise": "Lateral Raise",

      // Cable equipment
      "Cable Station": "Cable Station",
      "Dual Cable Station": "Cable Station",
      "Adjustable Pulley": "Cable Station",
      "Multistation Adjustable Pulley": "Cable Station",
      "Single Pulley": "Cable Station",
      "Dual Adjustable Pulley": "Cable Station",
      "Multistation": "Cable Station",
      "Dual Pulley Pulldown": "Cable Station",
      "FTS Glide": "Cable Station"
    };

    let equipmentData = null;
    let currentGym = null;
    let gyms = [];
    let searchMode = false;
    let selectedTags = [];
    let isLandingPage = true;
    let equipmentIndex = {};
    let selectedEquipment = null;

    function encodeEquipmentKey(machineType) {
      return machineType.replace(/ /g, '_').replace(/\//g, '-');
    }

    function decodeEquipmentKey(encoded) {
      return encoded.replace(/_/g, ' ').replace(/-/g, '/');
    }

    function buildEquipmentIndex() {
      equipmentIndex = {};
      for (const gymName of gyms) {
        const gymData = equipmentData.gyms[gymName];
        for (const [category, machines] of Object.entries(gymData.categories || {})) {
          for (const machine of machines) {
            // Map machine name to type, or use name if not in map
            const machineType = machineTypeMap[machine.name] || machine.name;
            if (!equipmentIndex[machineType]) {
              equipmentIndex[machineType] = [];
            }
            equipmentIndex[machineType].push({
              gym: gymName,
              category,
              brand: machine.brand,
              name: machine.name,
              notes: machine.notes,
              tags: machine.tags
            });
          }
        }
      }
    }

    async function loadEquipment() {
      try {
        let response = await fetch('equipment.json').catch(() => null);
        if (!response) {
          response = await fetch('./equipment.json').catch(() => null);
        }

        if (response && response.ok) {
          equipmentData = await response.json();
        } else {
          equipmentData = getMockEquipmentData();
        }

        gyms = Object.keys(equipmentData.gyms).sort();
        if (gyms.length === 0) {
          showError('No gyms found in data');
          return;
        }

        buildEquipmentIndex();
        renderGymList();
        loadGymFromUrl();
        window.addEventListener('popstate', loadGymFromUrl);
      } catch (error) {
        showError(`Error: ${error.message}`);
      }
    }

    function getMockEquipmentData() {
      return {
        gyms: {
          'Cecil Street': {
            status: 'complete',
            categories: {
              'Upper': [
                { brand: 'Precor', name: 'Chest Press', notes: null, tags: ['chest', 'shoulders', 'triceps'] },
                { brand: 'Matrix', name: 'Lat Pulldown', notes: null, tags: ['back', 'biceps'] }
              ],
              'Lower': [
                { brand: 'Hoist', name: 'Leg Press', notes: null, tags: ['legs', 'quads', 'glutes'] }
              ]
            }
          },
          'Harbourfront': {
            status: 'ongoing',
            categories: {
              'Upper': [
                { brand: 'LifeFitness', name: 'Dual Pulley', notes: null, tags: ['arms', 'back', 'biceps', 'chest', 'core', 'shoulders', 'triceps'] }
              ]
            }
          },
          'Tanjong Pagar': {
            status: 'complete',
            categories: {
              'Calisthenics': [
                { brand: null, name: 'Pull-up Bar', notes: null, tags: ['arms', 'back', 'biceps', 'core'] }
              ]
            }
          }
        }
      };
    }

    function loadGymFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const equipmentFromUrl = params.get('equipment');
      const tagFromUrl = params.get('tag');
      const gymFromUrl = params.get('gym');

      if (equipmentFromUrl) {
        isLandingPage = false;
        const decodedMachineType = decodeEquipmentKey(equipmentFromUrl);
        selectedEquipment = decodedMachineType;
        searchMode = true;
        selectedTags = [];
        document.getElementById('searchInput').value = '';
        updateSuggestions('');
        renderGymList();
        renderEquipmentResults(decodedMachineType);
      } else if (tagFromUrl) {
        isLandingPage = false;
        selectedTags = [tagFromUrl];
        searchMode = true;
        selectedEquipment = null;
        document.getElementById('searchInput').value = '';
        updateSuggestions('');
        renderGymList();
        renderSearchResults();
      } else if (gymFromUrl && INITIAL_TO_GYM[gymFromUrl]) {
        isLandingPage = false;
        selectGym(INITIAL_TO_GYM[gymFromUrl]);
      } else if (!currentGym) {
        isLandingPage = true;
        renderLandingPage();
      }
    }

    function renderGymList() {
      const gymList = document.getElementById('gymList');
      const mobileGymList = document.getElementById('mobileGymList');
      [gymList, mobileGymList].forEach(list => {
        if (!list) return;
        list.innerHTML = '';

        gyms.forEach(gym => {
          const link = document.createElement('a');
          link.className = 'gym-item' + (gym === currentGym ? ' active' : '');
          link.href = '?gym=' + GYM_INITIALS[gym].toLowerCase();

          const dot = document.createElement('div');
          dot.className = 'status-dot ' + equipmentData.gyms[gym].status;

          const name = document.createElement('span');
          name.className = 'gym-name';
          name.textContent = gym;

          const initial = document.createElement('span');
          initial.className = 'gym-initial';
          initial.textContent = GYM_INITIALS[gym];

          link.appendChild(dot);
          link.appendChild(name);
          link.appendChild(initial);
          link.addEventListener('click', closeMobileMenu);
          list.appendChild(link);
        });
      });
    }

    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('active');
      document.getElementById('menuOverlay').classList.remove('active');
      document.body.classList.remove('menu-open');
    }

    function selectGym(gym) {
      searchMode = false;
      selectedTags = [];
      selectedEquipment = null;
      currentGym = gym;
      document.getElementById('searchInput').value = '';
      updateSuggestions('');
      document.getElementById('searchOverlay').classList.remove('active');
      document.getElementById('searchContainer').classList.remove('active');
      const searchIcon = document.querySelector('.search-icon');
      const closeIcon = document.querySelector('.close-icon');
      searchIcon.style.display = 'block';
      closeIcon.style.display = 'none';
      window.history.pushState(null, '', `?gym=${GYM_INITIALS[gym].toLowerCase()}`);
      renderGymList();
      renderEquipment();
    }

    function updateSuggestions(input) {
      const suggestionsDiv = document.getElementById('suggestions');
      const inputLower = input.toLowerCase().trim();

      if (!inputLower) {
        suggestionsDiv.innerHTML = '';
        return;
      }

      let relatedTags = new Set();

      for (const [key, tags] of Object.entries(TAG_SUGGESTIONS)) {
        if (key.includes(inputLower) || inputLower.includes(key)) {
          tags.forEach(tag => relatedTags.add(tag));
        }
      }

      if (relatedTags.size === 0) {
        ALL_TAGS.forEach(tag => {
          if (tag.includes(inputLower)) {
            relatedTags.add(tag);
          }
        });
      }

      suggestionsDiv.innerHTML = Array.from(relatedTags)
        .slice(0, 8)
        .map(tag => `
          <div class="suggestion-chip${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</div>
        `)
        .join('');
    }

    function selectTag(tag) {
      selectedTags = [tag];
      searchMode = true;
      selectedEquipment = null;
      document.getElementById('suggestions').innerHTML = '';
      document.getElementById('suggestions').classList.remove('active');
      document.getElementById('searchContainer').classList.remove('active');
      document.getElementById('searchOverlay').classList.remove('active');
      const searchIcon = document.querySelector('.search-icon');
      const closeIcon = document.querySelector('.close-icon');
      searchIcon.style.display = 'block';
      closeIcon.style.display = 'none';
      window.history.pushState(null, '', `?tag=${tag}`);
      renderGymList();
      renderSearchResults();
    }

    function selectEquipment(machineName) {
      // Map machine name to type
      const machineType = machineTypeMap[machineName] || machineName;
      selectedEquipment = machineType;
      searchMode = true;
      selectedTags = [];
      document.getElementById('suggestions').innerHTML = '';
      document.getElementById('suggestions').classList.remove('active');
      document.getElementById('searchContainer').classList.remove('active');
      document.getElementById('searchOverlay').classList.remove('active');
      const searchIcon = document.querySelector('.search-icon');
      const closeIcon = document.querySelector('.close-icon');
      searchIcon.style.display = 'block';
      closeIcon.style.display = 'none';
      window.history.pushState(null, '', `?equipment=${encodeEquipmentKey(machineType)}`);
      renderGymList();
      renderEquipmentResults(machineType);
    }

    function renderEquipmentResults(machineType) {
      const content = document.getElementById('content');
      const locations = equipmentIndex[machineType] || [];

      if (locations.length === 0) {
        content.innerHTML = '<div class="empty-state">Equipment not found</div>';
        return;
      }

      const uniqueGyms = new Set(locations.map(loc => loc.gym));

      let html = `<div class="search-result-header">${machineType} found in ${uniqueGyms.size} gym${uniqueGyms.size !== 1 ? 's' : ''}</div>`;

      const gridRows = locations.map(({ gym, brand, name, notes }) => {
        const gymInitial = GYM_INITIALS[gym].toLowerCase();
        const displayBrand = brand === 'Unknown' ? '—' : brand;
        const equipmentDisplay = notes ? `${name} <span class="equipment-notes">${notes}</span>` : name;
        return `
          <div class="grid-row">
            <div class="grid-cell"><a href="?gym=${gymInitial}" class="outlet-link">${gym}</a></div>
            <div class="grid-cell brand">${displayBrand}</div>
            <div class="grid-cell">${equipmentDisplay}</div>
          </div>
        `;
      }).join('');

      html += `
        <div class="results-grid" style="--grid-cols: 3">
          <div class="grid-header">
            <div class="grid-cell"><strong>Gym</strong></div>
            <div class="grid-cell"><strong>Brand</strong></div>
            <div class="grid-cell"><strong>Equipment</strong></div>
          </div>
          ${gridRows}
        </div>
      `;

      content.innerHTML = html;
    }

    function renderSearchResults() {
      const content = document.getElementById('content');

      if (selectedTags.length === 0) {
        renderEquipment();
        return;
      }

      const allMatches = [];
      let totalMachines = 0;
      const gymsWithMatches = new Set();

      for (const gymName of gyms) {
        const gymData = equipmentData.gyms[gymName];

        for (const [category, machines] of Object.entries(gymData.categories || {})) {
          for (const machine of machines) {
            const machineMatches = selectedTags.some(tag => machine.tags.includes(tag));
            if (machineMatches) {
              allMatches.push({ gymName, category, machine });
              totalMachines++;
              gymsWithMatches.add(gymName);
            }
          }
        }
      }

      // Sort by category, then by gym
      allMatches.sort((a, b) => {
        if (a.category !== b.category) return a.category.localeCompare(b.category);
        return a.gymName.localeCompare(b.gymName);
      });

      let html = `<div class="search-result-header">${totalMachines} machines across ${gymsWithMatches.size} gyms matching: ${selectedTags.map(t => '<strong>' + t + '</strong>').join(', ')}</div>`;

      const gridRows = allMatches.map(({ gymName, category, machine }) => {
        const gymInitial = GYM_INITIALS[gymName].toLowerCase();
        const displayBrand = machine.brand === 'Unknown' ? '—' : machine.brand;
        const tagsHtml = machine.tags.map(tag => `<span class="tag${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</span>`).join('');
        const equipmentDisplay = machine.notes ? `${machine.name} <span class="equipment-notes">${machine.notes}</span>` : machine.name;
        return `
          <div class="grid-row">
            <div class="grid-cell"><a href="?gym=${gymInitial}" class="outlet-link">${gymName}</a></div>
            <div class="grid-cell">${category}</div>
            <div class="grid-cell brand">${displayBrand}</div>
            <div class="grid-cell"><span class="clickable-equipment" onclick="selectEquipment('${machine.name.replace(/'/g, "\\'")}')">${equipmentDisplay}</span></div>
            <div class="grid-cell tags-cell">
              ${tagsHtml}
            </div>
          </div>
        `;
      }).join('');

      html += `
        <div class="results-grid" style="--grid-cols: 5">
          <div class="grid-header">
            <div class="grid-cell"><strong>Gym</strong></div>
            <div class="grid-cell"><strong>Category</strong></div>
            <div class="grid-cell"><strong>Brand</strong></div>
            <div class="grid-cell"><strong>Equipment</strong></div>
            <div class="grid-cell"><strong>Muscle Groups</strong></div>
          </div>
          ${gridRows}
        </div>
      `;

      content.innerHTML = html || '<div class="empty-state">No equipment matches your search</div>';
    }

    function renderEquipment() {
      const content = document.getElementById('content');
      const gymData = equipmentData.gyms[currentGym];
      const status = gymData.status;
      const statusBadge = status === 'complete' ? '✓ Equipment list complete' : '⚠ Partial — last updated from session logs';

      let html = `
        <div class="gym-header">
          <div class="gym-title-section">
            <div class="gym-title">${currentGym}</div>
            <div class="status-badge">${statusBadge}</div>
          </div>
          <button class="btn-copy-equipment" id="openEquipmentModalBtn">
            <svg class="btn-icon" width='20' height='20' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><g transform="matrix(1 0 0 1 12 12)"><path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform="translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 17 C 2 17.552 2.448 18 3 18 C 3.552 18 4 17.552 4 17 L 4 4 L 17 4 C 17.552 4 18 3.552 18 3 C 18 2.448 17.552 2 17 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z"/></g></svg>
            Copy Equipment
          </button>
        </div>
      `;

      const allMachines = [];
      for (const [category, machines] of Object.entries(gymData.categories || {})) {
        if (!machines || machines.length === 0) continue;
        for (const machine of machines) {
          allMachines.push({ category, machine });
        }
      }

      if (allMachines.length === 0) {
        content.innerHTML = '<div class="empty-state">No equipment data for this gym</div>';
        return;
      }

      const gridRows = allMachines.map(({ category, machine }) => {
        const displayBrand = machine.brand === 'Unknown' ? '—' : machine.brand;
        const tagsHtml = machine.tags.map(tag => `<span class="tag${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</span>`).join('');
        const equipmentDisplay = machine.notes ? `${machine.name} <span class="equipment-notes">${machine.notes}</span>` : machine.name;
        return `
          <div class="grid-row">
            <div class="grid-cell">${category}</div>
            <div class="grid-cell brand">${displayBrand}</div>
            <div class="grid-cell"><span class="clickable-equipment" onclick="selectEquipment('${machine.name.replace(/'/g, "\\'")}')">${equipmentDisplay}</span></div>
            <div class="grid-cell tags-cell">
              ${tagsHtml}
            </div>
          </div>
        `;
      }).join('');

      html += `
        <div class="results-grid" style="--grid-cols: 4">
          <div class="grid-header">
            <div class="grid-cell"><strong>Category</strong></div>
            <div class="grid-cell"><strong>Brand</strong></div>
            <div class="grid-cell"><strong>Equipment</strong></div>
            <div class="grid-cell"><strong>Muscle Groups</strong></div>
          </div>
          ${gridRows}
        </div>
      `;

      content.innerHTML = html;
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `<div class="error">${message}</div>`;
    }

    function renderLandingPage() {
      const content = document.getElementById('content');

      const gymsList = gyms.map(gym => {
        const initial = GYM_INITIALS[gym].toLowerCase();
        const status = equipmentData.gyms[gym].status;
        const dot = `<div class="status-dot ${status}"></div>`;
        return `
          <a href="?gym=${initial}" class="gym-item">
            ${dot}
            <span class="gym-name">${gym}</span>
            <span class="gym-initial">${GYM_INITIALS[gym]}</span>
          </a>
        `;
      }).join('');

      const tagsList = Array.from(PRIMARY_TAGS)
        .sort()
        .map(tag => `<a href="?tag=${tag}" class="landing-tag">${tag}</a>`)
        .join('');

      const html = `
        <div class="landing-page">
          <h1>Find equipment across Singapore gyms</h1>

          <div class="landing-columns">
            <div class="landing-left">
              <h3>Browse Gyms</h3>
              <div class="landing-gym-list">
                ${gymsList}
              </div>
            </div>

            <div class="landing-right">
              <h3>Search by Muscle Group</h3>
              <div class="landing-tags">
                ${tagsList}
              </div>
            </div>
          </div>
        </div>
      `;

      content.innerHTML = html;
    }

    // Equipment Modal Functions
    function openEquipmentModal() {
      if (!currentGym) {
        console.warn('No gym selected');
        return;
      }

      const modal = document.getElementById('equipmentModal');
      const overlay = document.getElementById('equipmentModalOverlay');

      // Reset to defaults - be more specific with selectors
      document.querySelectorAll('#durationGroup .pill-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('#focusGroup .pill-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('durationGroup').querySelector('[data-value="60min"]').classList.add('active');
      document.getElementById('focusGroup').querySelector('[data-value="Full Body"]').classList.add('active');

      modal.classList.add('active');
      overlay.classList.add('active');

      updateEquipmentModalText();
    }

    function closeEquipmentModal() {
      const modal = document.getElementById('equipmentModal');
      const overlay = document.getElementById('equipmentModalOverlay');
      modal.classList.remove('active');
      overlay.classList.remove('active');
    }

    function updateEquipmentModalText() {
      const gymData = equipmentData.gyms[currentGym];
      const status = gymData.status === 'complete' ? 'Complete' : 'Incomplete';

      const duration = document.querySelector('#durationGroup .pill-btn.active').dataset.value;
      const focusArea = document.querySelector('#focusGroup .pill-btn.active').dataset.value;

      let text = `I'm at ${currentGym}. Generate me a ${duration} ${focusArea} workout from these equipment:\n\n`;

      // Organize by category
      for (const [category, machines] of Object.entries(gymData.categories || {})) {
        if (!machines || machines.length === 0) continue;
        text += `${category}:\n`;
        machines.forEach(machine => {
          const brandPart = machine.brand && machine.brand !== 'Unknown' ? `${machine.brand}: ` : '';
          const equipmentLine = `${brandPart}${machine.name}${machine.notes ? ` (${machine.notes})` : ''}`;
          text += `- ${equipmentLine}\n`;
        });
        text += `\n`;
      }

      text += `${currentGym} (${status})`;

      document.getElementById('equipmentText').textContent = text;
    }

    function copyEquipmentToClipboard() {
      const textEl = document.getElementById('equipmentText');
      if (!textEl) {
        console.error('Equipment text element not found');
        return;
      }

      const text = textEl.textContent;
      if (!text) {
        console.error('No text to copy');
        return;
      }

      const btn = document.getElementById('copyEquipmentBtn');
      const textSpan = document.getElementById('copyBtnText');
      const originalText = textSpan.textContent;

      // Try modern Clipboard API first
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => {
          textSpan.textContent = 'Copied!';
          btn.disabled = true;
          setTimeout(() => {
            textSpan.textContent = originalText;
            btn.disabled = false;
          }, 2000);
        }).catch(() => {
          fallbackCopy(text, btn, textSpan, originalText);
        });
      } else {
        // Fallback for HTTP or older browsers
        fallbackCopy(text, btn, textSpan, originalText);
      }
    }

    function fallbackCopy(text, btn, textSpan, originalText) {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      textarea.style.position = 'fixed';
      textarea.style.opacity = '0';
      document.body.appendChild(textarea);

      try {
        textarea.select();
        const success = document.execCommand('copy');
        if (success) {
          textSpan.textContent = 'Copied!';
          btn.disabled = true;
          setTimeout(() => {
            textSpan.textContent = originalText;
            btn.disabled = false;
          }, 2000);
        } else {
          throw new Error('execCommand failed');
        }
      } catch (err) {
        console.error('Fallback copy failed:', err);
        textSpan.textContent = 'Copy failed';
        setTimeout(() => {
          textSpan.textContent = originalText;
        }, 2000);
      } finally {
        document.body.removeChild(textarea);
      }
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      updateSuggestions(e.target.value);
    });

    document.getElementById('searchInput').addEventListener('focus', () => {
      const suggestionsDiv = document.getElementById('suggestions');
      suggestionsDiv.innerHTML = Array.from(PRIMARY_TAGS)
        .sort()
        .map(tag => `
          <div class="suggestion-chip primary" onclick="selectTag('${tag}')">${tag}</div>
        `)
        .join('');
      suggestionsDiv.classList.add('active');
    });

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      const searchContainer = document.getElementById('searchContainer');
      searchContainer.classList.remove('active');
      document.getElementById('suggestions').classList.remove('active');
      document.getElementById('searchOverlay').classList.remove('active');

      const mobileMenu = document.getElementById('mobileMenu');
      mobileMenu.classList.toggle('active');
      document.getElementById('menuOverlay').classList.toggle('active');

      if (mobileMenu.classList.contains('active')) {
        document.body.classList.add('menu-open');
      } else {
        document.body.classList.remove('menu-open');
      }
    });

    document.getElementById('menuOverlay').addEventListener('click', closeMobileMenu);

    document.getElementById('mobileMenuCloseBtn').addEventListener('click', closeMobileMenu);

    document.getElementById('searchToggleBtn').addEventListener('click', () => {
      const searchContainer = document.getElementById('searchContainer');
      const searchOverlay = document.getElementById('searchOverlay');
      const searchIcon = document.querySelector('.search-icon');
      const closeIcon = document.querySelector('.close-icon');

      searchContainer.classList.toggle('active');
      searchOverlay.classList.toggle('active');

      if (searchContainer.classList.contains('active')) {
        searchIcon.style.display = 'none';
        closeIcon.style.display = 'block';
        setTimeout(() => {
          document.getElementById('searchInput').focus();
        }, 200);
      } else {
        searchIcon.style.display = 'block';
        closeIcon.style.display = 'none';
        document.getElementById('suggestions').classList.remove('active');
      }
    });

    document.getElementById('searchOverlay').addEventListener('click', () => {
      document.getElementById('searchContainer').classList.remove('active');
      document.getElementById('searchOverlay').classList.remove('active');
      document.getElementById('suggestions').classList.remove('active');
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const input = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!input) return;

      let matchingTags = [];

      if (ALL_TAGS.includes(input)) {
        matchingTags = [input];
      } else {
        for (const [key, tags] of Object.entries(TAG_SUGGESTIONS)) {
          if (key.includes(input) || input.includes(key)) {
            matchingTags.push(...tags);
            break;
          }
        }

        if (matchingTags.length === 0) {
          matchingTags = ALL_TAGS.filter(tag => tag.includes(input));
        }
      }

      if (matchingTags.length > 0) {
        selectTag(matchingTags[0]);
        document.getElementById('searchContainer').classList.remove('active');
        document.getElementById('suggestions').classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const searchContainer = document.getElementById('searchContainer');
        if (searchContainer.classList.contains('active')) {
          searchContainer.classList.remove('active');
          document.getElementById('suggestions').classList.remove('active');
        }
      }
    });

    document.addEventListener('click', (e) => {
      const searchContainer = document.getElementById('searchContainer');
      if (!searchContainer.contains(e.target)) {
        document.getElementById('suggestions').innerHTML = '';
      }
    });

    // Equipment Modal Event Listeners
    document.addEventListener('click', (e) => {
      if (e.target.closest('#openEquipmentModalBtn')) {
        openEquipmentModal();
      }
    });

    document.getElementById('equipmentModalCloseBtn').addEventListener('click', closeEquipmentModal);

    document.getElementById('equipmentModalOverlay').addEventListener('click', closeEquipmentModal);

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('pill-btn')) {
        const group = e.target.parentElement;
        group.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        updateEquipmentModalText();
      }
    });

    document.getElementById('copyEquipmentBtn').addEventListener('click', copyEquipmentToClipboard);

    loadEquipment();
  </script>
</body>
</html>
