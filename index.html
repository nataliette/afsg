<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Equipment Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      position: sticky;
      top: 0;
      background-color: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .search-container {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .search-input {
      flex: 1;
      padding: 10px 16px;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }

    .search-input:focus {
      outline: none;
      border-color: #2196f3;
      box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
    }

    .clear-btn {
      padding: 10px 16px;
      background-color: #f0f0f0;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background-color: #e0e0e0;
    }

    .clear-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .suggestion-chip {
      padding: 6px 12px;
      background-color: #e3f2fd;
      border: 1px solid #90caf9;
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .suggestion-chip:hover {
      background-color: #bbdefb;
    }

    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    aside {
      width: 200px;
      background-color: #f9f9f9;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 16px 0;
    }

    .gym-list {
      list-style: none;
    }

    .gym-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .gym-item:hover {
      background-color: #efefef;
    }

    .gym-item.active {
      background-color: #e3f2fd;
      border-left-color: #2196f3;
      font-weight: 500;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .status-dot.complete {
      background-color: #4caf50;
    }

    .status-dot.ongoing {
      background-color: #ff9800;
    }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px 32px;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }

    h2:first-of-type {
      margin-top: 0;
    }

    .search-result-header {
      font-size: 16px;
      color: #666;
      margin-bottom: 16px;
      padding: 12px;
      background-color: #f5f5f5;
      border-radius: 4px;
    }

    .gym-section {
      margin-bottom: 32px;
    }

    .gym-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }

    .category-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .category-list li {
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
      font-size: 15px;
    }

    .category-list li:before {
      content: "•";
      position: absolute;
      left: 0;
      color: #666666;
    }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: #999999;
    }

    .error {
      padding: 32px;
      text-align: center;
      color: #d32f2f;
    }

    .search-active aside {
      display: none;
    }

    @media (max-width: 768px) {
      .main-container {
        flex-direction: column;
      }

      aside {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        max-height: 120px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .gym-list {
        display: flex;
        flex-direction: row;
      }

      .gym-item {
        white-space: nowrap;
        border-bottom: 3px solid transparent;
        border-left: none;
        padding: 10px 16px;
      }

      .gym-item.active {
        border-bottom-color: #2196f3;
        border-left: none;
      }

      main {
        padding: 16px;
      }

      header {
        padding: 12px;
      }

      header h1 {
        font-size: 20px;
        margin-bottom: 12px;
      }

      .search-input {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Gym Equipment Tracker</h1>
    <div class="search-container">
      <input
        type="text"
        id="searchInput"
        class="search-input"
        placeholder="Search by muscle group (e.g., leg, back, chest...)"
      >
      <button id="clearBtn" class="clear-btn" disabled>Clear</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </header>

  <div class="main-container" id="mainContainer">
    <aside>
      <ul class="gym-list" id="gymList"></ul>
    </aside>

    <main id="main">
      <div class="empty-state">Loading equipment data...</div>
    </main>
  </div>

  <script>
    const TAG_SUGGESTIONS = {
      'leg': ['quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors'],
      'upper': ['chest', 'back', 'shoulders', 'arms'],
      'back': ['back', 'biceps'],
      'lat': ['back', 'biceps'],
      'row': ['back', 'biceps'],
      'pull': ['back', 'biceps'],
      'rear': ['back', 'shoulders'],
      'delt': ['shoulders'],
      'chest': ['chest', 'triceps'],
      'fly': ['chest', 'back', 'shoulders'],
      'press': ['chest', 'shoulders', 'triceps'],
      'arm': ['biceps', 'triceps'],
      'bicep': ['biceps'],
      'tricep': ['triceps'],
      'shoulder': ['shoulders'],
      'core': ['core'],
      'card': ['cardio'],
      'quad': ['quads'],
      'ham': ['hamstrings'],
      'glute': ['glutes'],
      'calf': ['calves']
    };

    const ALL_TAGS = ['chest', 'back', 'shoulders', 'arms', 'biceps', 'triceps', 'legs', 'quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors', 'core', 'cardio', 'calisthenics'];

    let equipmentData = null;
    let currentGym = null;
    let gyms = [];
    let searchMode = false;
    let selectedTags = [];

    async function loadEquipment() {
      try {
        const response = await fetch('./equipment.json');
        if (!response.ok) throw new Error('Failed to load equipment.json');
        equipmentData = await response.json();

        gyms = Object.keys(equipmentData.gyms).sort();
        if (gyms.length === 0) {
          showError('No gyms found in data');
          return;
        }

        currentGym = gyms[0];
        renderGymList();
        renderEquipment();
      } catch (error) {
        showError(`Error: ${error.message}`);
      }
    }

    function renderGymList() {
      const gymList = document.getElementById('gymList');
      gymList.innerHTML = '';

      gyms.forEach(gym => {
        const li = document.createElement('li');
        li.className = 'gym-item' + (gym === currentGym && !searchMode ? ' active' : '');

        const statusDot = document.createElement('div');
        statusDot.className = 'status-dot ' + equipmentData.gyms[gym].status;

        const label = document.createElement('span');
        label.textContent = gym;

        li.appendChild(statusDot);
        li.appendChild(label);
        li.onclick = () => selectGym(gym);
        gymList.appendChild(li);
      });
    }

    function selectGym(gym) {
      searchMode = false;
      selectedTags = [];
      currentGym = gym;
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').disabled = true;
      updateSuggestions('');
      renderGymList();
      renderEquipment();
      document.getElementById('mainContainer').classList.remove('search-active');
    }

    function updateSuggestions(input) {
      const suggestionsDiv = document.getElementById('suggestions');
      const inputLower = input.toLowerCase().trim();

      if (!inputLower) {
        suggestionsDiv.innerHTML = '';
        return;
      }

      let relatedTags = new Set();

      // Check if input matches a suggestion category
      for (const [key, tags] of Object.entries(TAG_SUGGESTIONS)) {
        if (key.includes(inputLower) || inputLower.includes(key)) {
          tags.forEach(tag => relatedTags.add(tag));
        }
      }

      // If no category match, show all tags that contain the input
      if (relatedTags.size === 0) {
        ALL_TAGS.forEach(tag => {
          if (tag.includes(inputLower)) {
            relatedTags.add(tag);
          }
        });
      }

      suggestionsDiv.innerHTML = Array.from(relatedTags)
        .slice(0, 8)
        .map(tag => `
          <div class="suggestion-chip" onclick="selectTag('${tag}')">${tag}</div>
        `)
        .join('');
    }

    function selectTag(tag) {
      if (!selectedTags.includes(tag)) {
        selectedTags.push(tag);
      }
      searchMode = true;
      document.getElementById('mainContainer').classList.add('search-active');
      document.getElementById('clearBtn').disabled = false;
      renderGymList();
      renderSearchResults();
    }

    function renderSearchResults() {
      const main = document.getElementById('main');

      if (selectedTags.length === 0) {
        renderEquipment();
        return;
      }

      const results = [];
      let totalMachines = 0;
      const gymsWithMatches = new Set();

      // Collect all matching equipment
      for (const gymName of gyms) {
        const gymData = equipmentData.gyms[gymName];
        const gymMatches = [];

        for (const [category, machines] of Object.entries(gymData.categories || {})) {
          for (const machine of machines) {
            const machineMatches = selectedTags.some(tag => machine.tags.includes(tag));
            if (machineMatches) {
              gymMatches.push({ category, machine });
              totalMachines++;
              gymsWithMatches.add(gymName);
            }
          }
        }

        if (gymMatches.length > 0) {
          results.push({ gymName, matches: gymMatches });
        }
      }

      // Sort by gym name
      results.sort((a, b) => a.gymName.localeCompare(b.gymName));

      let html = `<div class="search-result-header">${totalMachines} machines across ${gymsWithMatches.size} gyms matching: ${selectedTags.map(t => '<strong>' + t + '</strong>').join(', ')}</div>`;

      for (const { gymName, matches } of results) {
        const status = equipmentData.gyms[gymName].status;
        const statusBadge = status === 'complete' ? '✓' : '⚠';

        html += `
          <div class="gym-section">
            <h3>${statusBadge} ${gymName}</h3>
            <ul class="category-list">
              ${matches.map(({ category, machine }) => `<li>${machine.label}</li>`).join('')}
            </ul>
          </div>
        `;
      }

      main.innerHTML = html || '<div class="empty-state">No equipment matches your search</div>';
    }

    function renderEquipment() {
      const main = document.getElementById('main');
      const gymData = equipmentData.gyms[currentGym];
      const status = gymData.status;
      const statusBadge = status === 'complete' ? '✓ Equipment list complete' : '⚠ Partial — last updated from session logs';

      let html = `<div style="font-size: 12px; color: #999; margin-bottom: 16px;">${statusBadge}</div>`;
      let hasAnyCategory = false;

      for (const [category, machines] of Object.entries(gymData.categories || {})) {
        if (!machines || machines.length === 0) continue;

        hasAnyCategory = true;
        html += `
          <h2>${category}</h2>
          <ul class="category-list">
            ${machines.map(machine => `<li>${machine.label}</li>`).join('')}
          </ul>
        `;
      }

      if (!hasAnyCategory) {
        main.innerHTML = '<div class="empty-state">No equipment data for this gym</div>';
        return;
      }

      main.innerHTML = html;
    }

    function showError(message) {
      document.getElementById('main').innerHTML = `<div class="error">${message}</div>`;
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      updateSuggestions(e.target.value);
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      searchMode = false;
      selectedTags = [];
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').disabled = true;
      updateSuggestions('');
      renderGymList();
      renderEquipment();
      document.getElementById('mainContainer').classList.remove('search-active');
    });

    document.addEventListener('DOMContentLoaded', loadEquipment);
  </script>
</body>
</html>
