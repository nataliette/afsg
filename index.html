<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Equipment Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <aside>
    <h2>Gyms</h2>
    <div class="gym-list" id="gymList"></div>
  </aside>

  <main>
    <div class="menu-overlay" id="menuOverlay"></div>

    <div class="mobile-menu" id="mobileMenu">
      <div class="mobile-menu-header">
        <button class="mobile-menu-close" id="mobileMenuCloseBtn">×</button>
        <h2>Gyms</h2>
      </div>
      <div class="gym-list" id="mobileGymList"></div>
    </div>

    <header>
      <div class="header-top">
        <button class="hamburger-btn" id="hamburgerBtn">
          <svg fill="#000000" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 45.174 45.174" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <path d="M41.573,15.879v-1.675c0-1.922-1.558-3.495-3.479-3.495h-2.761c-1.921,0-3.479,1.573-3.479,3.495v4.693H13.319v-4.693 c0-1.922-1.558-3.495-3.479-3.495H7.079c-1.921,0-3.479,1.573-3.479,3.495v1.675c-1.979,0-3.6,1.617-3.6,3.613v6.172 c0,1.996,1.71,3.613,3.6,3.613v1.674c0,1.922,1.558,3.513,3.479,3.513H9.84c1.921,0,3.479-1.591,3.479-3.513v-4.676h18.536v4.676 c0,1.922,1.558,3.513,3.479,3.513h2.762c1.92,0,3.479-1.591,3.479-3.513v-1.674c1.979,0,3.6-1.619,3.6-3.613v-6.172 C45.172,17.496,43.462,15.879,41.573,15.879z"></path> </g> </g></svg>
        </button>
        <h1>AF Gym Equipment List</h1>
        <div class="search-container" id="searchContainer">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search by muscle group"
          >
          <button id="clearBtn" class="clear-btn" disabled>×</button>
          <button id="searchBtn" class="search-btn" type="button">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </button>
          <div class="suggestions" id="suggestions"></div>
        </div>
        <button class="search-toggle-btn" id="searchToggleBtn">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
        </button>
      </div>
    </header>

    <div class="content" id="content">
      <div class="empty-state">Loading equipment data...</div>
    </div>

    <div class="modal-overlay" id="equipmentModalOverlay"></div>
    <div class="modal" id="equipmentModal">
      <div class="modal-body">
        <div class="modal-section inline-label">
          <label>Duration:</label>
          <div class="pill-group" id="durationGroup">
            <button type="button" class="pill-btn" data-value="30min">30min</button>
            <button type="button" class="pill-btn" data-value="45min">45min</button>
            <button type="button" class="pill-btn active" data-value="60min">60min</button>
            <button type="button" class="pill-btn" data-value="75min">75min</button>
            <button type="button" class="pill-btn" data-value="90min">90min</button>
          </div>
        </div>

        <div class="modal-section inline-label">
          <label>Focus:</label>
          <div class="pill-group" id="focusGroup">
            <button type="button" class="pill-btn" data-value="Push">Push</button>
            <button type="button" class="pill-btn" data-value="Pull">Pull</button>
            <button type="button" class="pill-btn" data-value="Legs">Legs</button>
            <button type="button" class="pill-btn active" data-value="Full Body">Full Body</button>
            <button type="button" class="pill-btn" data-value="Upper">Upper</button>
            <button type="button" class="pill-btn" data-value="Lower">Lower</button>
          </div>
        </div>

        <div class="modal-section">
          <pre id="equipmentText" class="equipment-text"></pre>
        </div>
      </div>
      <div class="modal-footer">
        <button id="copyEquipmentBtn" class="btn-primary">
          <svg class="btn-icon" width='20' height='20' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><g transform="matrix(1 0 0 1 12 12)"><path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform="translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 17 C 2 17.552 2.448 18 3 18 C 3.552 18 4 17.552 4 17 L 4 4 L 17 4 C 17.552 4 18 3.552 18 3 C 18 2.448 17.552 2 17 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z"/></g></svg>
          <span id="copyBtnText">Copy to Clipboard</span>
        </button>
        <button id="equipmentModalCloseBtn" class="btn-secondary">Close</button>
      </div>
    </div>
  </main>

  <script>
    const TAG_SUGGESTIONS = {
      'leg': ['quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors'],
      'upper': ['chest', 'back', 'shoulders', 'arms'],
      'back': ['back', 'biceps'],
      'lat': ['back', 'biceps'],
      'row': ['back', 'biceps'],
      'pull': ['back', 'biceps'],
      'rear': ['back', 'shoulders'],
      'delt': ['shoulders'],
      'chest': ['chest', 'triceps'],
      'fly': ['chest', 'back', 'shoulders'],
      'press': ['chest', 'shoulders', 'triceps'],
      'arm': ['biceps', 'triceps'],
      'bicep': ['biceps'],
      'tricep': ['triceps'],
      'shoulder': ['shoulders'],
      'core': ['core'],
      'card': ['cardio'],
      'quad': ['quads'],
      'ham': ['hamstrings'],
      'glute': ['glutes'],
      'calf': ['calves']
    };

    const ALL_TAGS = ['chest', 'back', 'shoulders', 'arms', 'biceps', 'triceps', 'legs', 'quads', 'hamstrings', 'glutes', 'calves', 'adductors', 'abductors', 'core', 'cardio', 'calisthenics'];

    const PRIMARY_TAGS = new Set(['chest', 'back', 'shoulders', 'arms', 'legs', 'core', 'cardio', 'calisthenics']);

    function isPrimaryTag(tag) {
      return PRIMARY_TAGS.has(tag);
    }

    const GYM_INITIALS = {
      'Cecil Street': 'CS',
      'Grandtral Complex': 'GC',
      'Harbourfront': 'HF',
      'Labrador View': 'LV',
      'New Queensway': 'NQ',
      'Pasir Panjang': 'PP',
      'Tanjong Pagar': 'TP',
      'Telok Blangah': 'TB',
      'Wheelock Place': 'WP'
    };

    const INITIAL_TO_GYM = {};
    Object.entries(GYM_INITIALS).forEach(([gym, initial]) => {
      INITIAL_TO_GYM[initial.toLowerCase()] = gym;
    });

    let equipmentData = null;
    let currentGym = null;
    let gyms = [];
    let searchMode = false;
    let selectedTags = [];
    let isLandingPage = true;

    function parseMachine(label) {
      const match = label.match(/^([^:]+):\s*(.+)$/);
      if (match) {
        return { brand: match[1], machine: match[2] };
      }
      return { brand: '', machine: label };
    }

    async function loadEquipment() {
      try {
        let response = await fetch('equipment.json').catch(() => null);
        if (!response) {
          response = await fetch('./equipment.json').catch(() => null);
        }

        if (response && response.ok) {
          equipmentData = await response.json();
        } else {
          equipmentData = getMockEquipmentData();
        }

        gyms = Object.keys(equipmentData.gyms).sort();
        if (gyms.length === 0) {
          showError('No gyms found in data');
          return;
        }

        renderGymList();
        loadGymFromUrl();
        window.addEventListener('popstate', loadGymFromUrl);
      } catch (error) {
        showError(`Error: ${error.message}`);
      }
    }

    function getMockEquipmentData() {
      return {
        gyms: {
          'Cecil Street': {
            status: 'complete',
            categories: {
              'Upper': [
                { label: 'Precor: Chest Press', tags: ['chest', 'shoulders', 'triceps'] },
                { label: 'Matrix: Lat Pulldown', tags: ['back', 'biceps'] }
              ],
              'Lower': [
                { label: 'Hoist: Leg Press', tags: ['legs', 'quads', 'glutes'] }
              ]
            }
          },
          'Harbourfront': {
            status: 'ongoing',
            categories: {
              'Upper': [
                { label: 'LifeFitness: Dual Pulley', tags: ['arms', 'back', 'biceps', 'chest', 'core', 'shoulders', 'triceps'] }
              ]
            }
          },
          'Tanjong Pagar': {
            status: 'complete',
            categories: {
              'Calisthenics': [
                { label: 'Pull-up Bar', tags: ['arms', 'back', 'biceps', 'core'] }
              ]
            }
          }
        }
      };
    }

    function loadGymFromUrl() {
      const params = new URLSearchParams(window.location.search);
      const tagFromUrl = params.get('tag');
      const gymFromUrl = params.get('gym');

      if (tagFromUrl) {
        isLandingPage = false;
        selectedTags = [tagFromUrl];
        searchMode = true;
        document.getElementById('searchInput').value = '';
        document.getElementById('clearBtn').disabled = false;
        updateSuggestions('');
        renderGymList();
        renderSearchResults();
      } else if (gymFromUrl && INITIAL_TO_GYM[gymFromUrl]) {
        isLandingPage = false;
        selectGym(INITIAL_TO_GYM[gymFromUrl]);
      } else if (!currentGym) {
        isLandingPage = true;
        renderLandingPage();
      }
    }

    function renderGymList() {
      const gymList = document.getElementById('gymList');
      const mobileGymList = document.getElementById('mobileGymList');
      [gymList, mobileGymList].forEach(list => {
        if (!list) return;
        list.innerHTML = '';

        gyms.forEach(gym => {
          const link = document.createElement('a');
          link.className = 'gym-item' + (gym === currentGym ? ' active' : '');
          link.href = '?gym=' + GYM_INITIALS[gym].toLowerCase();

          const dot = document.createElement('div');
          dot.className = 'status-dot ' + equipmentData.gyms[gym].status;

          const name = document.createElement('span');
          name.className = 'gym-name';
          name.textContent = gym;

          const initial = document.createElement('span');
          initial.className = 'gym-initial';
          initial.textContent = GYM_INITIALS[gym];

          link.appendChild(dot);
          link.appendChild(name);
          link.appendChild(initial);
          link.addEventListener('click', closeMobileMenu);
          list.appendChild(link);
        });
      });
    }

    function closeMobileMenu() {
      document.getElementById('mobileMenu').classList.remove('active');
      document.getElementById('menuOverlay').classList.remove('active');
      document.body.classList.remove('menu-open');
    }

    function selectGym(gym) {
      searchMode = false;
      selectedTags = [];
      currentGym = gym;
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').disabled = true;
      updateSuggestions('');
      window.history.pushState(null, '', `?gym=${GYM_INITIALS[gym].toLowerCase()}`);
      renderGymList();
      renderEquipment();
    }

    function updateSuggestions(input) {
      const suggestionsDiv = document.getElementById('suggestions');
      const inputLower = input.toLowerCase().trim();

      if (!inputLower) {
        suggestionsDiv.innerHTML = '';
        return;
      }

      let relatedTags = new Set();

      for (const [key, tags] of Object.entries(TAG_SUGGESTIONS)) {
        if (key.includes(inputLower) || inputLower.includes(key)) {
          tags.forEach(tag => relatedTags.add(tag));
        }
      }

      if (relatedTags.size === 0) {
        ALL_TAGS.forEach(tag => {
          if (tag.includes(inputLower)) {
            relatedTags.add(tag);
          }
        });
      }

      suggestionsDiv.innerHTML = Array.from(relatedTags)
        .slice(0, 8)
        .map(tag => `
          <div class="suggestion-chip${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</div>
        `)
        .join('');
    }

    function selectTag(tag) {
      selectedTags = [tag];
      searchMode = true;
      document.getElementById('clearBtn').disabled = false;
      document.getElementById('suggestions').innerHTML = '';
      window.history.pushState(null, '', `?tag=${tag}`);
      renderGymList();
      renderSearchResults();
    }

    function renderSearchResults() {
      const content = document.getElementById('content');

      if (selectedTags.length === 0) {
        renderEquipment();
        return;
      }

      const allMatches = [];
      let totalMachines = 0;
      const gymsWithMatches = new Set();

      for (const gymName of gyms) {
        const gymData = equipmentData.gyms[gymName];

        for (const [category, machines] of Object.entries(gymData.categories || {})) {
          for (const machine of machines) {
            const machineMatches = selectedTags.some(tag => machine.tags.includes(tag));
            if (machineMatches) {
              allMatches.push({ gymName, category, machine });
              totalMachines++;
              gymsWithMatches.add(gymName);
            }
          }
        }
      }

      allMatches.sort((a, b) => a.gymName.localeCompare(b.gymName));

      let html = `<div class="search-result-header">${totalMachines} machines across ${gymsWithMatches.size} gyms matching: ${selectedTags.map(t => '<strong>' + t + '</strong>').join(', ')}</div>`;

      const tableRows = allMatches.map(({ gymName, category, machine }) => {
        const { brand, machine: machineName } = parseMachine(machine.label);
        const gymInitial = GYM_INITIALS[gymName].toLowerCase();
        const displayBrand = brand === '' ? '—' : brand;
        const tagsHtml = machine.tags.map(tag => `<span class="tag${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</span>`).join('');
        return `
          <tr>
            <td>${category}</td>
            <td class="brand">${displayBrand}</td>
            <td>${machineName}</td>
            <td class="tags-cell">
              ${tagsHtml}
            </td>
            <td><a href="?gym=${gymInitial}" class="outlet-link">${gymName}</a></td>
          </tr>
          <tr class="tags-row">
            <td colspan="5" class="tags-cell">
              ${tagsHtml}
            </td>
          </tr>
        `;
      }).join('');

      html += `
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Brand</th>
              <th>Equipment</th>
              <th>Muscle Groups</th>
              <th>Gym</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows}
          </tbody>
        </table>
      `;

      content.innerHTML = html || '<div class="empty-state">No equipment matches your search</div>';
    }

    function renderEquipment() {
      const content = document.getElementById('content');
      const gymData = equipmentData.gyms[currentGym];
      const status = gymData.status;
      const statusBadge = status === 'complete' ? '✓ Equipment list complete' : '⚠ Partial — last updated from session logs';

      let html = `
        <div class="gym-header">
          <div class="gym-title-section">
            <div class="gym-title">${currentGym}</div>
            <div class="status-badge">${statusBadge}</div>
          </div>
          <button class="btn-copy-equipment" id="openEquipmentModalBtn">
            <svg class="btn-icon" width='20' height='20' viewBox='0 0 24 24' xmlns='http://www.w3.org/2000/svg'><g transform="matrix(1 0 0 1 12 12)"><path style="stroke: none; stroke-width: 1; stroke-dasharray: none; stroke-linecap: butt; stroke-dashoffset: 0; stroke-linejoin: miter; stroke-miterlimit: 4; fill: currentColor; fill-rule: nonzero; opacity: 1;" transform="translate(-12, -12)" d="M 4 2 C 2.895 2 2 2.895 2 4 L 2 17 C 2 17.552 2.448 18 3 18 C 3.552 18 4 17.552 4 17 L 4 4 L 17 4 C 17.552 4 18 3.552 18 3 C 18 2.448 17.552 2 17 2 L 4 2 z M 8 6 C 6.895 6 6 6.895 6 8 L 6 20 C 6 21.105 6.895 22 8 22 L 20 22 C 21.105 22 22 21.105 22 20 L 22 8 C 22 6.895 21.105 6 20 6 L 8 6 z M 8 8 L 20 8 L 20 20 L 8 20 L 8 8 z"/></g></svg>
            Copy Equipment
          </button>
        </div>
      `;

      const allMachines = [];
      for (const [category, machines] of Object.entries(gymData.categories || {})) {
        if (!machines || machines.length === 0) continue;
        for (const machine of machines) {
          allMachines.push({ category, machine });
        }
      }

      if (allMachines.length === 0) {
        content.innerHTML = '<div class="empty-state">No equipment data for this gym</div>';
        return;
      }

      const tableRows = allMachines.map(({ category, machine }) => {
        const { brand, machine: machineName } = parseMachine(machine.label);
        const displayBrand = brand === '' ? '—' : brand;
        const tagsHtml = machine.tags.map(tag => `<span class="tag${isPrimaryTag(tag) ? ' primary' : ''}" onclick="selectTag('${tag}')">${tag}</span>`).join('');
        return `
          <tr>
            <td>${category}</td>
            <td class="brand">${displayBrand}</td>
            <td>${machineName}</td>
            <td class="tags-cell">
              ${tagsHtml}
            </td>
          </tr>
          <tr class="tags-row">
            <td colspan="4" class="tags-cell">
              ${tagsHtml}
            </td>
          </tr>
        `;
      }).join('');

      html += `
        <table>
          <thead>
            <tr>
              <th>Category</th>
              <th>Brand</th>
              <th>Equipment</th>
              <th>Muscle Groups</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows}
          </tbody>
        </table>
      `;

      content.innerHTML = html;
    }

    function showError(message) {
      document.getElementById('content').innerHTML = `<div class="error">${message}</div>`;
    }

    function renderLandingPage() {
      const content = document.getElementById('content');

      const gymsList = gyms.map(gym => {
        const initial = GYM_INITIALS[gym].toLowerCase();
        const status = equipmentData.gyms[gym].status;
        const dot = `<div class="status-dot ${status}"></div>`;
        return `
          <a href="?gym=${initial}" class="gym-item">
            ${dot}
            <span class="gym-name">${gym}</span>
            <span class="gym-initial">${GYM_INITIALS[gym]}</span>
          </a>
        `;
      }).join('');

      const tagsList = Array.from(PRIMARY_TAGS)
        .sort()
        .map(tag => `<a href="?tag=${tag}" class="landing-tag">${tag}</a>`)
        .join('');

      const html = `
        <div class="landing-page">
          <h1>Find equipment across Singapore gyms</h1>

          <div class="landing-columns">
            <div class="landing-left">
              <h3>Browse Gyms</h3>
              <div class="landing-gym-list">
                ${gymsList}
              </div>
            </div>

            <div class="landing-right">
              <h3>Search by Muscle Group</h3>
              <div class="landing-tags">
                ${tagsList}
              </div>
            </div>
          </div>
        </div>
      `;

      content.innerHTML = html;
    }

    // Equipment Modal Functions
    function openEquipmentModal() {
      if (!currentGym) return;

      const modal = document.getElementById('equipmentModal');
      const overlay = document.getElementById('equipmentModalOverlay');

      // Reset to defaults
      document.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelector('[data-value="60min"]').classList.add('active');
      document.querySelector('[data-value="Full Body"]').classList.add('active');

      modal.classList.add('active');
      overlay.classList.add('active');

      updateEquipmentModalText();
    }

    function closeEquipmentModal() {
      const modal = document.getElementById('equipmentModal');
      const overlay = document.getElementById('equipmentModalOverlay');
      modal.classList.remove('active');
      overlay.classList.remove('active');
    }

    function updateEquipmentModalText() {
      const gymData = equipmentData.gyms[currentGym];
      const status = gymData.status === 'complete' ? 'Complete' : 'Incomplete';

      const duration = document.querySelector('#durationGroup .pill-btn.active').dataset.value;
      const focusArea = document.querySelector('#focusGroup .pill-btn.active').dataset.value;

      let text = `I'm at ${currentGym}. Generate me a ${duration} ${focusArea} workout from these equipment:\n\n`;

      // Organize by category
      for (const [category, machines] of Object.entries(gymData.categories || {})) {
        if (!machines || machines.length === 0) continue;
        text += `${category}:\n`;
        machines.forEach(machine => {
          text += `- ${machine.label}\n`;
        });
        text += `\n`;
      }

      text += `${currentGym} (${status})`;

      document.getElementById('equipmentText').textContent = text;
    }

    function copyEquipmentToClipboard() {
      const text = document.getElementById('equipmentText').textContent;

      navigator.clipboard.writeText(text).then(() => {
        const btn = document.getElementById('copyEquipmentBtn');
        const textSpan = document.getElementById('copyBtnText');
        const originalText = textSpan.textContent;
        textSpan.textContent = 'Copied!';
        btn.disabled = true;

        setTimeout(() => {
          textSpan.textContent = originalText;
          btn.disabled = false;
        }, 2000);
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    // Event listeners
    document.getElementById('searchInput').addEventListener('input', (e) => {
      updateSuggestions(e.target.value);
    });

    document.getElementById('searchInput').addEventListener('focus', () => {
      const suggestionsDiv = document.getElementById('suggestions');
      suggestionsDiv.innerHTML = Array.from(PRIMARY_TAGS)
        .sort()
        .map(tag => `
          <div class="suggestion-chip primary" onclick="selectTag('${tag}')">${tag}</div>
        `)
        .join('');
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      searchMode = false;
      selectedTags = [];
      document.getElementById('searchInput').value = '';
      document.getElementById('clearBtn').disabled = true;
      updateSuggestions('');
      window.history.pushState(null, '', window.location.pathname);
      renderGymList();
      renderEquipment();
    });

    document.getElementById('hamburgerBtn').addEventListener('click', () => {
      const searchContainer = document.getElementById('searchContainer');
      searchContainer.classList.remove('active');
      document.getElementById('suggestions').classList.remove('active');

      const mobileMenu = document.getElementById('mobileMenu');
      mobileMenu.classList.toggle('active');
      document.getElementById('menuOverlay').classList.toggle('active');

      if (mobileMenu.classList.contains('active')) {
        document.body.classList.add('menu-open');
      } else {
        document.body.classList.remove('menu-open');
      }
    });

    document.getElementById('menuOverlay').addEventListener('click', closeMobileMenu);

    document.getElementById('mobileMenuCloseBtn').addEventListener('click', closeMobileMenu);

    document.getElementById('searchToggleBtn').addEventListener('click', () => {
      document.getElementById('searchContainer').classList.toggle('active');
      document.getElementById('suggestions').classList.toggle('active');
      if (document.getElementById('searchContainer').classList.contains('active')) {
        document.getElementById('searchInput').focus();
      }
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      const input = document.getElementById('searchInput').value.toLowerCase().trim();
      if (!input) return;

      let matchingTags = [];

      if (ALL_TAGS.includes(input)) {
        matchingTags = [input];
      } else {
        for (const [key, tags] of Object.entries(TAG_SUGGESTIONS)) {
          if (key.includes(input) || input.includes(key)) {
            matchingTags.push(...tags);
            break;
          }
        }

        if (matchingTags.length === 0) {
          matchingTags = ALL_TAGS.filter(tag => tag.includes(input));
        }
      }

      if (matchingTags.length > 0) {
        selectTag(matchingTags[0]);
        document.getElementById('searchContainer').classList.remove('active');
        document.getElementById('suggestions').classList.remove('active');
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        const searchContainer = document.getElementById('searchContainer');
        if (searchContainer.classList.contains('active')) {
          searchContainer.classList.remove('active');
          document.getElementById('suggestions').classList.remove('active');
        }
      }
    });

    document.addEventListener('click', (e) => {
      const searchContainer = document.getElementById('searchContainer');
      if (!searchContainer.contains(e.target)) {
        document.getElementById('suggestions').innerHTML = '';
      }
    });

    // Equipment Modal Event Listeners
    document.addEventListener('click', (e) => {
      if (e.target.closest('#openEquipmentModalBtn')) {
        openEquipmentModal();
      }
    });

    document.getElementById('equipmentModalCloseBtn').addEventListener('click', closeEquipmentModal);

    document.getElementById('equipmentModalOverlay').addEventListener('click', closeEquipmentModal);

    document.addEventListener('click', (e) => {
      if (e.target.classList.contains('pill-btn')) {
        const group = e.target.parentElement;
        group.querySelectorAll('.pill-btn').forEach(btn => btn.classList.remove('active'));
        e.target.classList.add('active');
        updateEquipmentModalText();
      }
    });

    document.getElementById('copyEquipmentBtn').addEventListener('click', copyEquipmentToClipboard);

    document.addEventListener('DOMContentLoaded', loadEquipment);
  </script>
</body>
</html>
