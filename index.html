<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gym Equipment Tracker</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #ffffff;
      color: #333333;
      display: flex;
      min-height: 100vh;
    }

    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background-color: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
      padding: 16px;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
    }

    .content-wrapper {
      display: flex;
      width: 100%;
      margin-top: 60px;
    }

    aside {
      width: 200px;
      background-color: #f9f9f9;
      border-right: 1px solid #e0e0e0;
      overflow-y: auto;
      padding: 16px 0;
      position: fixed;
      top: 60px;
      left: 0;
      bottom: 0;
    }

    .gym-list {
      list-style: none;
    }

    .gym-list li {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.2s;
    }

    .gym-list li:hover {
      background-color: #efefef;
    }

    .gym-list li.active {
      background-color: #e3f2fd;
      border-left-color: #2196f3;
      font-weight: 500;
    }

    main {
      flex: 1;
      margin-left: 200px;
      padding: 24px 32px;
      max-width: 900px;
    }

    h2 {
      font-size: 20px;
      font-weight: 600;
      margin-top: 24px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }

    h2:first-of-type {
      margin-top: 0;
    }

    .category-list {
      list-style: none;
      margin-bottom: 20px;
    }

    .category-list li {
      padding: 6px 0;
      padding-left: 20px;
      position: relative;
      line-height: 1.5;
      font-size: 15px;
    }

    .category-list li:before {
      content: "•";
      position: absolute;
      left: 0;
      color: #666666;
    }

    .empty-state {
      padding: 32px;
      text-align: center;
      color: #999999;
    }

    .error {
      padding: 32px;
      text-align: center;
      color: #d32f2f;
    }

    @media (max-width: 768px) {
      .content-wrapper {
        flex-direction: column;
      }

      aside {
        position: relative;
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #e0e0e0;
        max-height: 150px;
        overflow-x: auto;
        overflow-y: hidden;
      }

      .gym-list {
        display: flex;
        flex-direction: row;
      }

      .gym-list li {
        white-space: nowrap;
        border-bottom: 3px solid transparent;
        border-left: none;
        padding: 10px 16px;
      }

      .gym-list li.active {
        border-bottom-color: #2196f3;
        border-left: none;
      }

      main {
        margin-left: 0;
        padding: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Gym Equipment Tracker</h1>
  </header>

  <div class="content-wrapper">
    <aside>
      <ul class="gym-list" id="gymList"></ul>
    </aside>

    <main id="main">
      <div class="empty-state">Loading equipment data...</div>
    </main>
  </div>

  <script>
    const CATEGORIES = [
      "Cables",
      "Upper",
      "Lower",
      "Plate-Loaded",
      "Barbells & Racks",
      "Calisthenics",
      "Other"
    ];

    let equipmentData = null;
    let currentGym = null;
    let gyms = [];

    async function loadEquipment() {
      try {
        const response = await fetch('./equipment.json');
        if (!response.ok) throw new Error('Failed to load equipment.json');
        equipmentData = await response.json();

        gyms = Object.keys(equipmentData.gyms).sort();
        if (gyms.length === 0) {
          showError('No gyms found in data');
          return;
        }

        currentGym = gyms[0];
        renderGymList();
        renderEquipment();
      } catch (error) {
        showError(`Error: ${error.message}`);
      }
    }

    function renderGymList() {
      const gymList = document.getElementById('gymList');
      gymList.innerHTML = '';

      gyms.forEach(gym => {
        const li = document.createElement('li');
        li.textContent = gym;
        li.className = gym === currentGym ? 'active' : '';
        li.onclick = () => selectGym(gym);
        gymList.appendChild(li);
      });
    }

    function selectGym(gym) {
      currentGym = gym;
      renderGymList();
      renderEquipment();
    }

    function renderEquipment() {
      const main = document.getElementById('main');
      const gymData = equipmentData.gyms[currentGym];

      let html = '';
      let hasAnyCategory = false;

      CATEGORIES.forEach(category => {
        const items = gymData[category] || [];
        if (items.length === 0) return;

        hasAnyCategory = true;
        html += `
          <h2>${category}</h2>
          <ul class="category-list">
            ${items.map(item => `<li>${item}</li>`).join('')}
          </ul>
        `;
      });

      if (!hasAnyCategory) {
        main.innerHTML = '<div class="empty-state">No equipment data for this gym</div>';
        return;
      }

      main.innerHTML = html;
    }

    function showError(message) {
      document.getElementById('main').innerHTML = `<div class="error">${message}</div>`;
    }

    document.addEventListener('DOMContentLoaded', loadEquipment);
  </script>
</body>
</html>
