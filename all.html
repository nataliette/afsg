<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equipment Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #111;
      min-height: 100vh;
    }

    /* ── Sticky header (toolbar + col headers as one unit) ── */
    .sticky-head {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #fff;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }

    .toolbar {
      padding: 8px 16px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar h1 { font-size: 14px; font-weight: 700; white-space: nowrap; }
    .toolbar-sep { width: 1px; height: 20px; background: #ddd; flex-shrink: 0; }

    .toolbar input[type="text"],
    .toolbar select {
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: inherit;
      background: #fff;
      height: 28px;
    }
    .toolbar input[type="text"] { width: 180px; }

    .btn {
      height: 28px;
      padding: 0 12px;
      border-radius: 4px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn:hover { background: #f5f5f5; }
    .btn-primary { background: #333; color: #fff; border-color: #333; }
    .btn-primary:hover { background: #555; }

    .stats { font-size: 12px; color: #888; margin-left: auto; white-space: nowrap; }
    .stats strong { color: #111; }

    /* ── Column headers (thead sticky) ── */
    thead {
      position: sticky;
      top: var(--head-h, 44px);
      z-index: 50;
    }
    thead th {
      background: #f8f9fa;
      border-top: 1px solid #e8e8e8;
      border-bottom: 1px solid #e8e8e8;
      border-right: 1px solid #eee;
      padding: 6px 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #666;
      font-weight: 600;
      text-align: left;
    }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      min-width: 1118px;
      table-layout: fixed;
    }

    /* Column widths — must match .col-head spans */
    td:nth-child(1) { width: 140px; }
    td:nth-child(2) { width: 130px; }
    td:nth-child(3) { width: 130px; }
    td:nth-child(4) { width: 160px; }
    td:nth-child(5) { width: 130px; }
    td:nth-child(6) { width: 240px; }
    td:nth-child(7) { width: 160px; }
    td:nth-child(8) { width: 28px;  }

    tbody tr { border-bottom: 1px solid #f0f0f0; }
    tbody tr:hover td { background: #fafbfc; }
    tbody tr.changed td { background: #f0fff4; }
    tbody tr.changed:hover td { background: #e8fef0; }

    td { padding: 3px 5px; vertical-align: middle; }

    td.gym-cell {
      font-size: 11px;
      color: #888;
      padding-left: 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Inline field inputs ── */
    td input.f, td select.f {
      width: 100%;
      border: 1px solid transparent;
      border-radius: 3px;
      padding: 3px 5px;
      font-size: 12px;
      font-family: inherit;
      background: transparent;
      color: inherit;
      min-width: 0;
    }
    td input.f:hover { border-color: #ddd; background: #fff; }
    td input.f:focus { border-color: #94a3b8; background: #fff; outline: none; box-shadow: 0 0 0 2px rgba(100,130,200,.15); }
    td select.f { cursor: pointer; }
    td select.f:hover, td select.f:focus { border-color: #94a3b8; background: #fff; outline: none; }

    /* ── Tags ── */
    .tags-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 3px;
      align-items: center;
      padding: 2px 0;
      min-height: 26px;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1d4ed8;
      border-radius: 3px;
      padding: 1px 5px 1px 6px;
      font-size: 11px;
      white-space: nowrap;
    }
    .chip button {
      background: none;
      border: none;
      cursor: pointer;
      color: #93c5fd;
      font-size: 12px;
      line-height: 1;
      padding: 0 0 1px 0;
    }
    .chip button:hover { color: #dc2626; }
    input.tag-add {
      border: none;
      background: transparent;
      font-size: 11px;
      font-family: inherit;
      outline: none;
      width: 72px;
      color: #444;
      padding: 2px 3px;
    }
    input.tag-add::placeholder { color: #bbb; }

    /* ── Equipment type cell ── */
    select.type-ovr {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 3px;
      padding: 2px 4px;
      font-size: 11px;
      font-family: monospace;
      color: #64748b;
      background: #f8fafc;
      cursor: pointer;
    }
    select.type-ovr.mapped { border-color: #fcd34d; color: #92400e; background: #fffbeb; }
    select.type-ovr.set    { border-color: #86efac; color: #166534; background: #f0fdf4; font-weight: 600; }

    /* ── Delete btn ── */
    button.del {
      background: none;
      border: none;
      color: #d1d5db;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 2px 4px;
      display: block;
      margin: auto;
    }
    button.del:hover { color: #dc2626; }

    .no-results { text-align: center; padding: 60px 20px; color: #aaa; font-size: 14px; }
  </style>
</head>
<body>

<div class="sticky-head">
  <div class="toolbar">
    <h1>Equipment Editor</h1>
    <div class="toolbar-sep"></div>
    <input type="text" id="q" placeholder="Search…">
    <select id="gymF"><option value="">All gyms</option></select>
    <select id="catF">
      <option value="">All categories</option>
      <option>Cardio</option><option>Cables</option><option>Upper</option>
      <option>Lower</option><option>Barbells &amp; Racks</option>
      <option>Calisthenics</option><option>Core</option><option>Other</option>
    </select>
    <select id="showF">
      <option value="">All rows</option>
      <option value="changed">Changed only</option>
      <option value="mapped">Mapped only</option>
    </select>
    <select id="typeF"><option value="">All machine types</option></select>
    <button class="btn" id="addRowBtn">+ Add row</button>
    <div class="stats" id="stats"></div>
    <button class="btn btn-primary" id="exportBtn">Export JSON</button>
    <button class="btn" id="resetBtn">Reset all</button>
  </div>
</div>

<!-- autocomplete datalists -->
<datalist id="dl-brand"></datalist>
<datalist id="dl-name"></datalist>
<datalist id="dl-tag">
  <option value="cardio"><option value="full body">
  <option value="chest"><option value="back"><option value="shoulders">
  <option value="arms"><option value="biceps"><option value="triceps">
  <option value="legs"><option value="quads"><option value="hamstrings">
  <option value="glutes"><option value="calves"><option value="core">
  <option value="adductors"><option value="abductors"><option value="calisthenics">
</datalist>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th style="width:140px">Gym</th>
        <th style="width:130px">Category</th>
        <th style="width:130px">Brand</th>
        <th style="width:160px">Name</th>
        <th style="width:130px">Notes</th>
        <th style="width:240px">Tags</th>
        <th style="width:160px">→ Equipment Type</th>
        <th style="width:28px"></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="no-results" id="empty" style="display:none">No equipment matches your filters.</div>
</div>

<script>
const CATS = ['Cardio','Cables','Upper','Lower','Barbells & Racks','Calisthenics','Core','Other'];

const TYPE_MAP = {
  "Bike":"Bike","Airdyne2":"Bike","Airdyne":"Bike","Assault Bike Pro":"Bike",
  "Assault Air Bike":"Bike","Bike Pro":"Bike","Lifecycle Bike":"Bike","LifeCycle":"Bike",
  "Stages Bike":"Bike","Solo":"Bike","Air Bike":"Bike","Stationary Bike":"Bike",
  "Seated Bike":"Bike","Spin Bike":"Bike","BikeErg":"Bike","Echo Bike":"Bike",
  "Rower":"Rower","RowErg":"Rower","Rower Elite":"Rower","AssaultRower Pro":"Rower","Air Rower":"Rower",
  "Chest Press":"Chest Press","Machine Chest Press":"Chest Press",
  "Iso-Lateral Chest Press":"Chest Press","Incline Chest Press":"Chest Press",
  "Decline Chest Press":"Chest Press","Plate-Loaded Chest Press":"Chest Press",
  "Converging Chest Press":"Chest Press","Iso-Lateral Bench Press":"Chest Press",
  "Seated Row":"Seated Row","Machine Row":"Seated Row","Iso-Lateral Row":"Seated Row",
  "Seal Row":"Seated Row","Plate-Loaded Row":"Seated Row","Plate-Loaded Seated Row":"Seated Row",
  "Row":"Seated Row","Low Row":"Seated Row",
  "Lat Pulldown":"Lat Pulldown","Machine Lat Pulldown":"Lat Pulldown",
  "Iso-Lateral Lat Pulldown":"Lat Pulldown","Wide-Grip Lat Pulldown":"Lat Pulldown",
  "Close-Grip Lat Pulldown":"Lat Pulldown","Iso-Lateral Front Lat Pulldown":"Lat Pulldown",
  "ISO-Lateral Front Lat Pulldown":"Lat Pulldown","Pulldown":"Lat Pulldown","Pulldown 304":"Lat Pulldown",
  "Leg Press":"Leg Press","45-Degree Leg Press":"Leg Press","Angled Leg Press":"Leg Press",
  "Horizontal Leg Press":"Leg Press","Vertical Leg Press":"Leg Press",
  "Seated Leg Press":"Leg Press","Linear Leg Press":"Leg Press",
  "Hack Squat":"Hack Squat","Linear Hack Squat":"Hack Squat",
  "Belt Squat":"Belt Squat",
  "Squat Machine":"Squat","Perfect Squat":"Squat","Super Squat Press":"Squat",
  "Shoulder Press":"Shoulder Press","Converging Shoulder Press":"Shoulder Press",
  "Multi-Press":"Shoulder Press","Iso-Lateral Shoulder Press":"Shoulder Press",
  "Leg Curl":"Leg Curl","Seated Leg Curl":"Leg Curl","Prone Leg Curl":"Leg Curl",
  "Hip Ab/Ad":"Hip Ab/Ad","Hip Abduction Machine":"Hip Ab/Ad","Hip Adduction Machine":"Hip Ab/Ad",
  "Hip Abductor/Adductor":"Hip Ab/Ad","Hip Abductor / Hip Adductor":"Hip Ab/Ad","Hip Abduction/Adduction Machine":"Hip Ab/Ad",
  "Inner/Outer Thigh Machine":"Hip Ab/Ad","Inner/Outer Thigh":"Hip Ab/Ad",
  "Hip Thrust":"Hip Thrust","Hip Thrust Machine":"Hip Thrust",
  "Hip Thrust Elite":"Hip Thrust","Glute Drive":"Hip Thrust",
  "Pec Delt Fly":"Pec Delt Fly","Rear Delt Fly":"Pec Delt Fly",
  "Rear Delt Reverse Fly Machine":"Pec Delt Fly","Fly/Delt Machine":"Pec Delt Fly",
  "Rear Delt Machine":"Pec Delt Fly","Rear Delt / Pec Fly":"Pec Delt Fly",
  "Pec Fly / Rear Delt":"Pec Delt Fly","Pectoral Fly / Rear Deltoid":"Pec Delt Fly",
  "Rear Delt Pec Fly":"Pec Delt Fly",
  "Abdominal":"Abdominal","Abdominal Crunch":"Abdominal","Vertical Crunch":"Abdominal",
  "Back Extension":"Back Extension","Back Extension Bench":"Back Extension",
  "Back Extension Machine":"Back Extension",
  "Smith Machine":"Smith Machine",
  "Deadlift Platform":"Deadlift Platform",
  "Lateral Raise":"Lateral Raise","Standing Lateral Raise":"Lateral Raise",
  "Plate Loaded Lat Raise":"Lateral Raise",
  "Cable Station":"Cable Station","Dual Cable Station":"Cable Station",
  "Adjustable Pulley":"Cable Station","Multistation Adjustable Pulley":"Cable Station",
  "Single Pulley":"Cable Station","Dual Adjustable Pulley":"Cable Station",
  "Multistation":"Cable Station","Dual Pulley Pulldown":"Cable Station",
  "FTS Glide":"Cable Station","Cable":"Cable Station","Cable Tower":"Cable Station",
  "Longpull 302":"Cable Station",
  "Exercise Ball 55cm":"Exercise Ball","Exercise Ball 65cm":"Exercise Ball",
  "Exercise Ball":"Exercise Ball",
};

const ALL_TYPES = [...new Set([
  ...Object.values(TYPE_MAP),
  'Bike','Rower','RowErg','Elliptical','Treadmill','Stairmaster',
  'Rack','Smith Machine','Deadlift Platform',
  'Chest Press','Incline Chest Press','Decline Chest Press',
  'Shoulder Press','Row','Seated Row','Lat Pulldown',
  'Leg Press','Leg Extension','Hack Squat','Belt Squat','Leg Curl',
  'Hip Ab/Ad','Hip Thrust','Pec Delt Fly','Back Extension',
  'Abdominal','Lateral Raise','Seated Calf Raise','Calf Raise',
  'Cable Station','Dual Adjustable Pulley',
  'Biceps Curl','Triceps Press','Biceps Curl/Triceps Extension',
  "Captain's Chair",'Chin/Dip','Pull-up Bar','TRX','Battle Rope',
  'Punching Bag','Kettlebells','Medicine Ball',"Farmer's Carry",
  'Exercise Ball','Bosu Ball','Resistance Bands',
  'T-Bar Row','Rotary Torso','V-Squat','Abdominal',
])].sort();

let data = null;
const changedKeys = new Set();

function resolve(name) { return TYPE_MAP[name] || name; }
function e(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function refreshDataLists() {
  const brands = new Set(), names = new Set([...Object.keys(TYPE_MAP),...Object.values(TYPE_MAP)]);
  for (const gd of Object.values(data.gyms))
    for (const ms of Object.values(gd.categories||{}))
      for (const m of ms) { if (m.brand) brands.add(m.brand); if (m.name) names.add(m.name); }
  document.getElementById('dl-brand').innerHTML = [...brands].sort().map(b=>`<option value="${e(b)}">`).join('');
  document.getElementById('dl-name').innerHTML = [...names].sort().map(n=>`<option value="${e(n)}">`).join('');
}

function rowKey(gymName, cat, idx) { return `${gymName}¦${cat}¦${idx}`; }
function parseKey(key) {
  const parts = key.split('¦');
  return { gymName: parts[0], cat: parts[1], idx: parseInt(parts[2]) };
}
function getMachine(key) {
  const {gymName,cat,idx} = parseKey(key);
  return data.gyms[gymName].categories[cat][idx];
}

function tagsHtml(tags, key) {
  const chips = (tags||[]).map((t,ti) =>
    `<span class="chip">${e(t)}<button type="button" data-action="rm-tag" data-key="${e(key)}" data-ti="${ti}">×</button></span>`
  ).join('');
  return `<div class="tags-wrap">${chips}<input class="tag-add" list="dl-tag" placeholder="add tag…" data-action="add-tag" data-key="${e(key)}"></div>`;
}

function typeCellHtml(name, ovr) {
  const res = resolve(name);
  const isMapped = res !== name;
  const cls = ovr ? 'set' : isMapped ? 'mapped' : '';
  const defaultLabel = ovr ? `— ${e(res)} —`
    : isMapped ? `${e(name)} → ${e(res)}`
    : `— ${e(res)} —`;
  return `<select class="type-ovr${cls?' '+cls:''}" data-field="ovr">
      <option value="">${defaultLabel}</option>
      ${ALL_TYPES.map(t=>`<option value="${e(t)}"${ovr===t?' selected':''}>${e(t)}</option>`).join('')}
    </select>`;
}

function renderAll() {
  const tbody = document.getElementById('tbody');
  const gymSel = document.getElementById('gymF');
  const prevGym = gymSel.value;

  let html = '';
  const gyms = Object.keys(data.gyms).sort();

  for (const gymName of gyms) {
    const gd = data.gyms[gymName];
    if (!gd.categories) continue;
    for (const [cat, machines] of Object.entries(gd.categories)) {
      machines.forEach((m, idx) => {
        const key = rowKey(gymName, cat, idx);
        const wasChanged = changedKeys.has(key);
        html += `<tr data-gym="${e(gymName)}" data-cat="${e(cat)}" data-idx="${idx}" data-key="${e(key)}"${wasChanged?' class="changed"':''}>
          <td class="gym-cell" title="${e(gymName)}">${e(gymName)}</td>
          <td><select class="f" data-field="cat" data-key="${e(key)}">
            ${CATS.map(c=>`<option${c===cat?' selected':''}>${e(c)}</option>`).join('')}
          </select></td>
          <td><input class="f" list="dl-brand" value="${m.brand === 'Unknown' ? '—' : e(m.brand||'')}" data-field="brand" data-key="${e(key)}" placeholder="Brand"></td>
          <td><input class="f" list="dl-name"  value="${e(m.name||'')}"  data-field="name"  data-key="${e(key)}" placeholder="Name"></td>
          <td><input class="f" value="${e(m.notes||'')}" data-field="notes" data-key="${e(key)}" placeholder="Notes"></td>
          <td>${tagsHtml(m.tags, key)}</td>
          <td data-type-cell data-key="${e(key)}">${typeCellHtml(m.name, m._ovr)}</td>
          <td><button class="del" data-action="del" data-key="${e(key)}" title="Delete">×</button></td>
        </tr>`;
      });
    }
  }

  tbody.innerHTML = html;
  gymSel.innerHTML = '<option value="">All gyms</option>' + gyms.map(g=>`<option${g===prevGym?' selected':''}>${e(g)}</option>`).join('');
  refreshDataLists();
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('q').value.toLowerCase();
  const gymF = document.getElementById('gymF').value;
  const catF = document.getElementById('catF').value;
  const showF = document.getElementById('showF').value;
  const typeF = document.getElementById('typeF').value;
  let shown = 0;

  document.querySelectorAll('#tbody tr[data-key]').forEach(tr => {
    const gymName = tr.dataset.gym;
    const cat = tr.dataset.cat;
    const idx = parseInt(tr.dataset.idx);
    const m = data.gyms[gymName].categories[cat][idx];
    const changed = changedKeys.has(tr.dataset.key);
    const mapped = resolve(m.name) !== m.name;
    const resolvedType = m._ovr || resolve(m.name);

    let vis = true;
    if (gymF && gymName !== gymF) vis = false;
    if (catF && cat !== catF) vis = false;
    if (typeF && resolvedType !== typeF) vis = false;
    if (showF === 'changed' && !changed) vis = false;
    if (showF === 'mapped' && !mapped) vis = false;
    if (q) {
      const hay = [gymName, cat, m.brand, m.name, m.notes||'', (m.tags||[]).join(' ')].join(' ').toLowerCase();
      if (!hay.includes(q)) vis = false;
    }
    tr.style.display = vis ? '' : 'none';
    if (vis) shown++;
  });

  document.getElementById('empty').style.display = shown === 0 ? 'block' : 'none';
  document.getElementById('stats').innerHTML = `<strong>${shown}</strong> rows · <strong>${changedKeys.size}</strong> changed`;
}

function markChanged(key) {
  changedKeys.add(key);
  const tr = document.querySelector(`#tbody tr[data-key="${CSS.escape(key)}"]`);
  if (tr) tr.classList.add('changed');
  document.getElementById('stats').innerHTML = document.getElementById('stats').innerHTML
    .replace(/\d+ changed/, `${changedKeys.size} changed`);
}

document.getElementById('tbody').addEventListener('change', e => {
  const el = e.target;
  const key = el.dataset.key;
  const field = el.dataset.field;
  if (!key || !field) return;

  const {gymName, cat, idx} = parseKey(key);
  const m = data.gyms[gymName].categories[cat][idx];

  if (field === 'brand') {
    m.brand = el.value === '—' ? 'Unknown' : el.value;
    markChanged(key);
    refreshDataLists();
  } else if (field === 'name') {
    m.name = el.value;
    markChanged(key);
    refreshDataLists();
    const typeCell = document.querySelector(`#tbody td[data-type-cell][data-key="${CSS.escape(key)}"]`);
    if (typeCell) typeCell.innerHTML = typeCellHtml(m.name, m._ovr);
  } else if (field === 'notes') {
    m.notes = el.value.trim() || null;
    markChanged(key);
  } else if (field === 'cat') {
    const newCat = el.value;
    if (newCat !== cat) {
      if (!data.gyms[gymName].categories[newCat]) data.gyms[gymName].categories[newCat] = [];
      data.gyms[gymName].categories[newCat].push(m);
      data.gyms[gymName].categories[cat].splice(idx, 1);
      changedKeys.add(rowKey(gymName, newCat, data.gyms[gymName].categories[newCat].length - 1));
      renderAll();
    }
  } else if (field === 'ovr') {
    m._ovr = el.value || undefined;
    el.className = 'type-ovr' + (el.value ? ' set' : (resolve(m.name) !== m.name ? ' mapped' : ''));
    markChanged(key);
  }
});

document.getElementById('tbody').addEventListener('click', e => {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;

  if (action === 'rm-tag') {
    const key = btn.dataset.key;
    const ti = parseInt(btn.dataset.ti);
    const m = getMachine(key);
    m.tags.splice(ti, 1);
    markChanged(key);
    btn.closest('td').innerHTML = tagsHtml(m.tags, key);
  } else if (action === 'del') {
    const key = btn.dataset.key;
    const {gymName, cat, idx} = parseKey(key);
    const m = data.gyms[gymName].categories[cat][idx];
    if (confirm(`Delete "${m.name}" from ${gymName}?`)) {
      data.gyms[gymName].categories[cat].splice(idx, 1);
      changedKeys.delete(key);
      renderAll();
    }
  }
});

document.getElementById('tbody').addEventListener('keydown', e => {
  if (e.target.dataset.action !== 'add-tag') return;
  if (e.key !== 'Enter' && e.key !== ',' && e.key !== 'Tab') return;
  e.preventDefault();
  const val = e.target.value.trim().replace(/,$/,'');
  if (!val) return;
  const key = e.target.dataset.key;
  const m = getMachine(key);
  if (!m.tags) m.tags = [];
  if (!m.tags.includes(val)) { m.tags.push(val); markChanged(key); }
  e.target.value = '';
  e.target.closest('td').innerHTML = tagsHtml(m.tags, key);
});

document.getElementById('addRowBtn').addEventListener('click', () => {
  const gymF = document.getElementById('gymF').value;
  if (!gymF) {
    alert('Select a gym in the filter first.');
    return;
  }
  if (!data.gyms[gymF].categories.Other) data.gyms[gymF].categories.Other = [];
  data.gyms[gymF].categories.Other.push({ tags: [], brand: '', name: '', notes: null });
  renderAll();
  const rows = document.querySelectorAll(`#tbody tr[data-gym="${CSS.escape(gymF)}"][data-cat="Other"]`);
  const last = rows[rows.length - 1];
  if (last) {
    last.scrollIntoView({ block: 'center' });
    last.querySelector('input[data-field="name"]')?.focus();
  }
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const out = JSON.parse(JSON.stringify(data));
  for (const gd of Object.values(out.gyms))
    for (const ms of Object.values(gd.categories||{}))
      for (const m of ms) delete m._ovr;
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  Object.assign(document.createElement('a'), {href: URL.createObjectURL(blob), download:'equipment.json'}).click();
});

document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Reset all changes?')) return;
  changedKeys.clear();
  init();
});

['q','gymF','catF','showF','typeF'].forEach(id => {
  document.getElementById(id).addEventListener('input', applyFilters);
  document.getElementById(id).addEventListener('change', applyFilters);
});

// Populate machine type dropdown from static ALL_TYPES list
const typeF = document.getElementById('typeF');
ALL_TYPES.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; typeF.appendChild(o); });

// Keep thead sticky-top in sync with toolbar height
const stickyHead = document.querySelector('.sticky-head');
new ResizeObserver(() => {
  document.documentElement.style.setProperty('--head-h', stickyHead.offsetHeight + 'px');
}).observe(stickyHead);

async function init() {
  const res = await fetch('equipment.json?' + Date.now());
  data = await res.json();
  renderAll();
}

init();
</script>
</body>
</html>
